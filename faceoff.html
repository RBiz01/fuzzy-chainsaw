<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a071f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Permissions-Policy" content="accelerometer=*, gyroscope=*, screen-wake-lock=*">
    
    <title>FACE OFF!!</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        :root {
            --cyan: #00f5ff;
            --magenta: #ff2ec4;
            --blue: #00bfff;
            --red: #ff3366;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        
        body, html {
            height: 100dvh;
            width: 100dvw;
            overflow: hidden;
            touch-action: none;
            font-family: 'Inter', system-ui, sans-serif;
            background: #05050f;
            color: white;
        }
        
        #app {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: linear-gradient(135deg, #0a071f 0%, #1a1433 100%);
        }
        
        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            height: 100%;
            transition: opacity 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .screen.active {
            display: flex;
            opacity: 1;
        }
        
        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.1rem;
            font-weight: 700;
            letter-spacing: -2.5px;
            background: linear-gradient(90deg, #00f5ff, #ff2ec4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(0, 245, 255, 0.6);
        }

        .glass {
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(24px);
            box-shadow: 0 8px 32px -12px rgba(0,0,0,0.6);
        }

        .word-card {
            width: 100%;
            max-width: 100%;
            max-height: 88%;
            background: linear-gradient(145deg, rgba(26,20,51,0.95), rgba(15,10,31,0.95));
            border: 3px solid transparent;
            border-image: linear-gradient(90deg, var(--cyan), var(--magenta)) 1;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px 20px;
            box-shadow: 
                0 20px 40px -15px rgba(0, 245, 255, 0.4),
                inset 0 4px 20px rgba(255,255,255,0.08);
            transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }
        
        .word-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.12), transparent 70%);
            pointer-events: none;
        }

        .correct-flash {
            animation: correctPop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-image: linear-gradient(90deg, #22ff99, #00f5ff) 1 !important;
        }
        
        @keyframes correctPop {
            0%   { transform: scale(0.92) rotate(-4deg); }
            40%  { transform: scale(1.18) rotate(3deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .timer-container {
            position: relative;
            width: 72px;
            height: 72px;
        }
        
        .timer-ring {
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            background: conic-gradient(var(--cyan) 0% 100%, transparent 0%);
            mask: radial-gradient(farthest-side, transparent calc(100% - 9px), black calc(100% - 8px));
        }
        
        .timer {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.65rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 25px var(--cyan);
        }

        #countdown-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5,5,15,0.94);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        #countdown-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14rem;
            font-weight: 700;
            line-height: 1;
            color: #ffffff;
            -webkit-text-stroke: 8px #ffeb3b;
            text-shadow: 
                0 0 20px #ffeb3b,
                0 0 40px #ffeb3b,
                0 0 70px #ff9800,
                0 0 100px rgba(255, 235, 59, 0.6);
            filter: drop-shadow(0 0 60px #ffeb3b);
        }

        button {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            letter-spacing: -0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            touch-action: manipulation;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00f5ff, #ff2ec4);
            color: #05050f;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.45rem;
            letter-spacing: -0.5px;
            padding: 22px 48px;
            border-radius: 9999px;
            border: none;
            box-shadow: 
                0 0 40px rgba(0, 245, 255, 0.6),
                0 15px 30px -10px rgba(255, 46, 196, 0.5);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            width: 100%;
            max-width: 320px;
            margin: 24px auto;
            display: block;
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 
                0 0 60px rgba(0, 245, 255, 0.8),
                0 20px 40px -10px rgba(255, 46, 196, 0.7);
        }
        
        .btn-primary:active {
            transform: scale(0.96);
        }

        #home-screen {
            background: linear-gradient(135deg, #0a071f, #1f1838);
            justify-content: flex-start;
            padding: 0;
            gap: 16px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #home-screen:active {
            background: linear-gradient(135deg, #0a071f, #2a1f4a);
            transition: background 0.18s;
        }

        .home-content {
            text-align: center;
            padding: 48px 20px 24px;
        }

        .category-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 24px 12px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 30px -15px rgba(0,245,255,0.3);
        }
        
        .category-card:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: var(--cyan);
        }

        .game-header {
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            height: 108px;
        }
        
        .header-center {
            text-align: center;
            flex: 1;
            position: relative;
        }
    </style>
</head>
<body>

    <!-- PORTRAIT BLOCKER -->
    <div id="portrait-blocker" style="position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; gap: 24px;">
        <div style="font-size: 6rem; animation: rotate 2s infinite linear;">↔️</div>
        <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 2.6rem; font-weight: 700; letter-spacing: -1px;">ROTATE YOUR PHONE</h1>
        <p style="font-size: 1.2rem; opacity: 0.8;">FACE OFF works best in landscape mode</p>
    </div>

    <!-- MAIN APP -->
    <div id="app">

        <!-- HOME SCREEN -->
        <div id="home-screen" class="screen active">

            <div class="home-content">
                <h1 class="title">FACE OFF</h1>
                <p style="font-size: 1.05rem; opacity: 0.7; margin-top: 6px; letter-spacing: 3px;">TEAM BATTLE</p>

                <button onclick="startGame(); event.stopPropagation();" class="btn-primary">
                    START FACE OFF
                </button>
            </div>

            <div style="flex: 1; display: flex; align-items: center; justify-content: center; min-height: 180px;">
                <div style="width: 10px; height: 10px; margin: 0 auto; background: linear-gradient(135deg, #00f5ff, #ff2ec4); border-radius: 9999px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 70px -8px #00f5ff, 0 30px 50px -15px #ff2ec4;">
                    <span style="font-size: 6.8rem; filter: drop-shadow(0 0 25px rgba(255,255,255,0.9));"></span>
                </div>
            </div>

            <div style="height: 48px;"></div>
        </div>

        <!-- CATEGORY SCREEN -->
        <div id="category-screen" class="screen" style="padding: 28px 18px; background: linear-gradient(135deg, #0a071f, #1a1433);">
            <h2 style="font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 28px; letter-spacing: -1px;">CHOOSE YOUR BATTLE</h2>
            <div id="category-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; flex: 1; overflow-y: auto; padding-bottom: 30px;"></div>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="screen" style="background: linear-gradient(135deg, #0a071f, #1a1433);">

            <!-- TOP BAR -->
            <div class="glass game-header">
                <div id="team-header" style="display: flex; align-items: center; gap: 12px;"></div>
                
                <div class="header-center">
                    <div id="timer-wrapper" class="timer-container" style="margin: 0 auto;">
                        <div class="timer-ring" id="timer-ring"></div>
                        <div id="timer" class="timer">1:00</div>
                    </div>
                </div>

                <div style="display: flex; gap: 28px;">
                    <div style="text-align: center;">
                        <div style="color: var(--blue); font-size: 10px; font-weight: 600;">BLUE</div>
                        <div id="score-blue" style="font-family: 'Space Grotesk', sans-serif; font-size: 1.95rem; font-weight: 700;">0</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="color: var(--red); font-size: 10px; font-weight: 600;">RED</div>
                        <div id="score-red" style="font-family: 'Space Grotesk', sans-serif; font-size: 1.95rem; font-weight: 700;">0</div>
                    </div>
                </div>
            </div>

            <!-- WORD AREA -->
            <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 18px; min-height: 0;">
                <div id="word-container" class="word-card">
                    <div id="current-word" style="font-family: 'Space Grotesk', sans-serif; font-size: 2.65rem; font-weight: 700; line-height: 1.08; max-width: 100%;"></div>
                </div>
            </div>

            <!-- INSTRUCTIONS -->
            <div style="text-align: center; font-size: 12px; opacity: 0.65; padding: 8px 0 6px; letter-spacing: 0.5px;">
                PHONE ON FOREHEAD<br>
                <span style="color: #22ff99;">TILT DOWN = CORRECT</span> • 
                <span style="color: #ff6b6b;">TILT UP = PASS</span>
            </div>

            <!-- BOTTOM BAR -->
            <div class="glass" style="text-align: center; padding: 16px 20px; font-size: 13px; color: var(--cyan);">
                <div id="words-count">0 CORRECT</div>
            </div>
        </div>

        <!-- BIG CENTERED COUNTDOWN OVERLAY -->
        <div id="countdown-overlay">
            <div id="countdown-number">3</div>
        </div>

        <!-- TIME'S UP OVERLAY -->
        <div id="timesup-overlay" style="position: fixed; inset: 0; background: rgba(185,28,28,0.94); z-index: 9999; display: none; align-items: center; justify-content: center;">
            <div id="timesup-text" style="font-family: 'Space Grotesk', sans-serif; font-size: 9rem; font-weight: 700; line-height: 1; color: #ffffff; -webkit-text-stroke: 8px #ffeb3b; text-shadow: 0 0 20px #ffeb3b, 0 0 40px #ffeb3b, 0 0 70px #ff9800, 0 0 100px rgba(255, 235, 59, 0.6); filter: drop-shadow(0 0 60px #ffeb3b);">TIME'S UP</div>
        </div>

        <!-- SUMMARY -->
        <div id="summary-screen" class="screen" style="background: linear-gradient(135deg, #0a071f, #1a1433); padding: 32px 20px; text-align: center;">
            <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <div id="summary-team" style="font-family: 'Space Grotesk', sans-serif; font-size: 2.9rem; font-weight: 700;"></div>
                <div id="summary-score">0</div>
                <button onclick="nextRound()" class="btn-primary" style="margin-top: 32px; font-size: 1.35rem; padding: 18px 56px;">NEXT ROUND →</button>
            </div>
        </div>

        <!-- FINAL SCREEN -->
        <div id="final-screen" class="screen" style="background: linear-gradient(135deg, #0a071f, #1a1433); padding: 32px 20px;">
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                <div id="winner-title" class="title" style="font-size: 3.8rem;"></div>
                
                <div class="glass" style="margin-top: 48px; width: 100%; max-width: 320px; padding: 26px 24px; border-radius: 24px;">
                    <div style="display: flex; justify-content: space-between; font-size: 1.45rem; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <span style="color: var(--blue);">BLUE</span>
                        <span id="final-blue" style="font-family: 'Space Grotesk', sans-serif; font-weight: 700;">0</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 1.45rem; padding: 16px 0;">
                        <span style="color: var(--red);">RED</span>
                        <span id="final-red" style="font-family: 'Space Grotesk', sans-serif; font-weight: 700;">0</span>
                    </div>
                </div>

                <button onclick="restartGame()" class="btn-primary" style="margin-top: 64px; width: 100%; max-width: 300px; padding: 20px;">
                    PLAY AGAIN
                </button>
            </div>
        </div>
    </div>

        let currentCategory = "";
        let remainingWords = [];
        let currentTeam = 1, roundNumber = 1;
        let scoreBlue = 0, scoreRed = 0, roundScore = 0;
        let timerInterval = null, timeLeft = 60;
        let gameActive = false, tiltCooldown = false;
        let wakeLock = null;
        let synth = null;

        async function initAudio() {
            await Tone.start();
            synth = new Tone.Synth({
                oscillator: { type: "sine" },
                envelope: { attack: 0.01, decay: 0.1, sustain: 0.3, release: 0.3 }
            }).toDestination();
        }

        function playCountdownBeep(number) {
            if (!synth) return;
            let note = "C4";
            if (number === 3) note = "C4";
            else if (number === 2) note = "D4";
            else if (number === 1) note = "E4";
            else if (number === "GO") note = "G5";
            synth.triggerAttackRelease(note, "8n", Tone.now(), 0.8);
        }

        function playCorrectSound() {
            if (!synth) return;
            synth.triggerAttackRelease("E5", "16n");
            setTimeout(() => synth.triggerAttackRelease("G5", "16n"), 80);
        }

        function playPassSound() {
            if (!synth) return;
            synth.triggerAttackRelease("C3", "8n", Tone.now(), 0.6);
        }

        function playTimesUpSound() {
            if (!synth) return;
            const now = Tone.now();
            synth.triggerAttackRelease("C5", "2n", now, 0.9);
            synth.triggerAttackRelease("A4", "2n", now + 0.3, 0.8);
            synth.triggerAttackRelease("F4", "2n", now + 0.6, 0.7);
            synth.triggerAttackRelease("C4", "2n", now + 0.9, 0.6);
        }

        function handleTilt(e) {
            const gamma = Math.max(-90, Math.min(90, e.gamma || 0));
            if (!gameActive || tiltCooldown) return;

            if (gamma >= 2 && gamma <= 35) {
                processCorrect();
                tiltCooldown = true;
                setTimeout(() => tiltCooldown = false, 2000);
            } else if (gamma >= -40 && gamma <= 0) {
                processPass();
                tiltCooldown = true;
                setTimeout(() => tiltCooldown = false, 2000);
            }
        }

        async function enableTilt() {
            if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
                try { await DeviceOrientationEvent.requestPermission(); } catch (e) {}
            }
            window.addEventListener('deviceorientation', handleTilt, { passive: true });
        }

        async function requestWakeLock() {
            if (!('wakeLock' in navigator)) return;
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
        }

        async function releaseWakeLock() {
            if (wakeLock) { try { await wakeLock.release(); } catch (e) {} wakeLock = null; }
        }

        async function forceFullscreen() {
            try {
                const el = document.documentElement;
                if (!document.fullscreenElement) {
                    if (el.requestFullscreen) await el.requestFullscreen({ navigationUI: "hide" });
                    else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
                }
            } catch (e) {}
        }

        function checkOrientation() {
            const blocker = document.getElementById("portrait-blocker");
            blocker.style.display = (window.innerWidth > window.innerHeight) ? "none" : "flex";
        }

        function updateSize() {
            const app = document.getElementById("app");
            if (window.visualViewport) {
                const vv = window.visualViewport;
                app.style.top = `${vv.offsetTop}px`;
                app.style.left = `${vv.offsetLeft}px`;
                app.style.width = `${vv.width}px`;
                app.style.height = `${vv.height - 6}px`;
            }
        }

        function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

        function createCategoryCards() {
            const grid = document.getElementById("category-grid");
            grid.innerHTML = "";
            Object.keys(wordLists).forEach(cat => {
                const div = document.createElement("div");
                div.className = "category-card glass";
                div.innerHTML = `
                    <div style="font-size: 3.8rem; margin-bottom: 12px;">${getEmoji(cat)}</div>
                    <div style="font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 700;">${cat}</div>
                `;
                div.onclick = () => selectCategory(cat);
                grid.appendChild(div);
            });
        }

        function getEmoji(c) {
            const e = {
                "Animals":"🦁","Sports":"⚽","Movies":"🎬","Song Titles":"🎵","TV Shows":"📺",
                "Famous People":"👑","Famous Singers":"🎤","Zoo":"🦒",
                "Food":"🍔","Disney and Pixar Characters":"🏰","Mythical Creatures":"🐉","Circus":"🎪"
            };
            return e[c] || "🔥";
        }

        function selectCategory(cat) {
            currentCategory = cat;
            document.getElementById("category-screen").classList.remove("active");
            document.getElementById("game-screen").classList.add("active");
            startNewRound();
        }

        async function startGame() {
            await forceFullscreen();
            await initAudio();
            enableTilt();
            document.getElementById("home-screen").classList.remove("active");
            document.getElementById("category-screen").classList.add("active");
            createCategoryCards();
            setTimeout(updateSize, 300);
        }

        function updateHeader() {
            const teamName = currentTeam === 1 ? "BLUE" : "RED";
            const color = currentTeam === 1 ? "var(--blue)" : "var(--red)";
            document.getElementById("team-header").innerHTML = `
                <div style="width: 52px; height: 52px; background: ${color}; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 0 25px ${color}30;">👥</div>
                <div>
                    <div style="font-size: 10px; opacity: 0.6;">TEAM</div>
                    <div style="font-family: 'Space Grotesk', sans-serif; font-size: 1.85rem; font-weight: 700; color: ${color};">${teamName}</div>
                    <div style="font-size: 1.1rem; font-weight: 700; color: ${color}; margin-top: 2px;">ROUND ${roundNumber}/3</div>
                </div>
            `;
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 60;
            updateTimer();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimer();
                if (timeLeft <= 0) endRound();
            }, 1000);
        }

        function updateTimer() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById("timer").textContent = `${m}:${s<10?'0':''}${s}`;
            const percent = (timeLeft / 60) * 100;
            document.getElementById("timer-ring").style.background = `conic-gradient(var(--cyan) ${percent}%, transparent ${percent}%)`;
        }

        function showNextWord() {
            if (remainingWords.length === 0) {
                remainingWords = shuffle([...wordLists[currentCategory]]);
            }
            document.getElementById("current-word").textContent = remainingWords[0];
        }

        function processCorrect() {
            if (!gameActive) return;
            roundScore++;
            document.getElementById("words-count").textContent = `${roundScore} CORRECT`;
            remainingWords.shift();
            playCorrectSound();
            const wc = document.getElementById("word-container");
            wc.classList.add("correct-flash");
            launchMiniConfetti();
            setTimeout(() => {
                wc.classList.remove("correct-flash");
                showNextWord();
            }, 650);
        }

        function processPass() {
            if (!gameActive) return;
            playPassSound();
            const current = remainingWords.shift();
            remainingWords.push(current);
            showNextWord();
        }

        function startNewRound() {
            roundScore = 0;
            gameActive = false;
            requestWakeLock();
            updateHeader();
            document.getElementById("current-word").textContent = "";
            document.getElementById("words-count").textContent = "0 CORRECT";

            remainingWords = shuffle([...wordLists[currentCategory]]);

            const overlay = document.getElementById("countdown-overlay");
            const numberEl = document.getElementById("countdown-number");
            overlay.style.display = "flex";
            let c = 3;
            numberEl.textContent = c;
            playCountdownBeep(3);

            const int = setInterval(() => {
                c--;
                numberEl.textContent = c || "GO";
                playCountdownBeep(c || "GO");
                if (c <= 0) {
                    clearInterval(int);
                    setTimeout(() => {
                        overlay.style.display = "none";
                        gameActive = true;
                        showNextWord();
                        startTimer();
                    }, 500);
                }
            }, 800);
        }

        function endRound() {
            gameActive = false;
            releaseWakeLock();
            clearInterval(timerInterval);
            if (currentTeam === 1) scoreBlue += roundScore; else scoreRed += roundScore;
            document.getElementById("score-blue").textContent = scoreBlue;
            document.getElementById("score-red").textContent = scoreRed;

            playTimesUpSound();

            const to = document.getElementById("timesup-overlay");
            to.style.display = "flex";
            setTimeout(() => { to.style.display = "none"; showSummary(); }, 2200);
        }

        function showSummary() {
            document.getElementById("game-screen").classList.remove("active");
            const s = document.getElementById("summary-screen");
            s.classList.add("active");
            const teamName = currentTeam === 1 ? `<span style="color:var(--blue)">BLUE TEAM</span>` : `<span style="color:var(--red)">RED TEAM</span>`;
            document.getElementById("summary-team").innerHTML = teamName;
            document.getElementById("summary-score").textContent = roundScore;
        }

        function nextRound() {
            document.getElementById("summary-screen").classList.remove("active");
            if (currentTeam === 1) currentTeam = 2;
            else { currentTeam = 1; roundNumber++; }
            
            if (roundNumber > 3) showFinal();
            else {
                document.getElementById("game-screen").classList.add("active");
                startNewRound();
            }
        }

        function showFinal() {
            document.getElementById("summary-screen").classList.remove("active");
            releaseWakeLock();
            const fs = document.getElementById("final-screen");
            fs.classList.add("active");
            document.getElementById("final-blue").textContent = scoreBlue;
            document.getElementById("final-red").textContent = scoreRed;

            const wt = document.getElementById("winner-title");
            if (scoreBlue > scoreRed) wt.innerHTML = `BLUE <span style="color:var(--blue)">WINS</span>`;
            else if (scoreRed > scoreBlue) wt.innerHTML = `RED <span style="color:var(--red)">WINS</span>`;
            else wt.textContent = "IT'S A TIE";

            if (scoreBlue !== scoreRed) launchConfetti(2800);
        }

        function launchConfetti(duration = 2200) {
            const c = document.getElementById("confetti-canvas");
            c.width = window.innerWidth; c.height = window.innerHeight;
            const ctx = c.getContext("2d");
            let particles = [];
            class P {
                constructor() {
                    this.x = Math.random() * c.width;
                    this.y = Math.random() * c.height - 100;
                    this.size = Math.random() * 13 + 7;
                    this.speed = Math.random() * 7 + 5;
                    this.angle = Math.random() * Math.PI * 2;
                    this.color = ["#00f5ff","#ff2ec4","#a78bfa"][Math.floor(Math.random()*3)];
                    this.rot = Math.random() * 0.1 - 0.05;
                }
                update() { this.y += this.speed; this.angle += this.rot; }
                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.size/2, -this.size/3, this.size, this.size*0.6);
                    ctx.restore();
                }
            }
            for (let i = 0; i < 200; i++) particles.push(new P());
            function anim() {
                ctx.clearRect(0,0,c.width,c.height);
                particles = particles.filter(p => { p.update(); p.draw(); return p.y < c.height + 50; });
                if (particles.length) requestAnimationFrame(anim);
            }
            anim();
            setTimeout(() => { particles = []; ctx.clearRect(0,0,c.width,c.height); }, duration);
        }

        function launchMiniConfetti() {
            const temp = document.createElement("canvas");
            temp.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:99999";
            document.body.appendChild(temp);
            const ctx = temp.getContext("2d");
            temp.width = window.innerWidth; temp.height = window.innerHeight;
            let ps = [];
            for (let i = 0; i < 42; i++) {
                ps.push({
                    x: window.innerWidth/2 + Math.random()*160-80,
                    y: window.innerHeight*0.6,
                    sx: Math.random()*7-3.5,
                    sy: -Math.random()*15-8,
                    size: Math.random()*8+4,
                    c: ["#00f5ff","#a78bfa"][Math.floor(Math.random()*2)],
                    life: 50
                });
            }
            function mini() {
                ctx.clearRect(0,0,temp.width,temp.height);
                let alive = false;
                ps.forEach(p => {
                    p.x += p.sx; p.y += p.sy; p.sy += 0.4; p.life--;
                    ctx.fillStyle = p.c;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                    if (p.life > 0) alive = true;
                });
                if (alive) requestAnimationFrame(mini);
                else temp.remove();
            }
            mini();
        }

        function restartGame() {
            releaseWakeLock();
            location.reload();
        }

        function init() {
            function resizeHandler() {
                updateSize();
                checkOrientation();
            }
            
            window.addEventListener('resize', resizeHandler);
            if (window.visualViewport) window.visualViewport.addEventListener('resize', resizeHandler);
            
            window.addEventListener('orientationchange', () => {
                setTimeout(resizeHandler, 150);
                setTimeout(resizeHandler, 400);
            });
            
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === "visible") {
                    setTimeout(resizeHandler, 200);
                    setTimeout(forceFullscreen, 500);
                }
            });

            document.getElementById("home-screen").addEventListener("click", function(e) {
                if (e.target.tagName !== "BUTTON") {
                    startGame();
                }
            });
            
            updateSize();
            checkOrientation();
            document.getElementById("home-screen").classList.add("active");
        }

        window.onload = init;
    </script>
</body>
</html>
