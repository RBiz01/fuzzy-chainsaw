<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fuzzy-ChainSaw</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      color: #e0f7ff;
      font-family: 'Roboto Mono', monospace;
      background: #0a0015;
      overflow-x: hidden;
    }

    /* Animated starry background */
    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at bottom, #1b0033 0%, #0a0015 100%);
      z-index: 1;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255,255,255,0.8);
      animation: twinkle 6s infinite alternate, drift 120s linear infinite;
    }

    @keyframes twinkle {
      0%,100% { opacity: 0.4; transform: scale(0.7); }
      50%     { opacity: 1;   transform: scale(1.1); }
    }

    @keyframes drift {
      0%   { transform: translateX(-10vw) translateY(-10vh); }
      100% { transform: translateX(110vw) translateY(110vh); }
    }

    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      background: linear-gradient(to bottom, rgba(10,0,21,0.4), rgba(0,0,0,0.6));
    }

    /* ── VIDEO HEADER – fixed to never collapse ─────────────────────────────────────── */
    .video-header {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      margin-bottom: 5rem;
      min-height: 420px;                 /* ← THIS FORCES THE HEADER TO SHOW */
      background: #120022;               /* ← fallback color so you always see the area */
    }

    .header-video {
      position: absolute;
      inset: 0;
      width: 90%;
      height: 90%;
      object-fit: cover;
      object-position: center;
      z-index: 1;
      display: block;                    /* ensures video renders */
      transform: translate3d(0, 0, 0);
      will-change: transform;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: rgba(10, 0, 21, 0.035);
      pointer-events: none;

      /* ── GPU compositing hack (makes the video actually play on GitHub Pages) ── */
      backdrop-filter: blur(0.8px);
      -webkit-backdrop-filter: blur(0.8px);
      filter: brightness(1.02);
      transform: translateZ(0);
      will-change: transform;
    }

    /* Ensure no text is visible */
    .video-overlay h1,
    .video-overlay .subtitle {
      display: none;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.6rem;
      width: 100%;
      max-width: 1100px;
      padding: 0 1rem;
      margin-bottom: 4rem;
    }

    .card {
      position: relative;
      background: rgba(20, 20, 60, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 240, 255, 0.18);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      text-align: center;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      overflow: hidden;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-12px) scale(1.04);
      border-color: rgba(0, 240, 255, 0.6);
      box-shadow: 
        0 25px 50px -12px rgba(0, 240, 255, 0.25),
        0 0 40px rgba(0, 240, 255, 0.15);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(45deg, transparent, rgba(0,240,255,0.12), transparent);
      opacity: 0;
      transition: opacity 0.6s;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #00f0ff;
      text-shadow: 0 0 15px rgba(0,240,255,0.7);
    }

    .card-desc {
      font-size: 0.95rem;
      color: #c0f0ff;
      opacity: 0.85;
      line-height: 1.5;
    }

    footer {
      margin-top: auto;
      padding: 3rem 1rem 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: #88aaff;
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      .video-header {
        aspect-ratio: 4 / 5;
        min-height: 520px;               /* taller fallback on mobile */
      }
      .container {
        padding: 1rem;
      }
    }

    @media (max-width: 500px) {
      .links-grid { gap: 1.2rem; }
      .card { padding: 1.8rem 1.2rem; }
    }
  </style>
</head>
<body>

  <div id="stars"></div>

  <div class="container">
    <header>
      <div class="video-header">
        <video 
          class="header-video"
          autoplay 
          muted 
          loop 
          playsinline
          preload="metadata"
          poster="https://picsum.photos/id/1015/1920/1080"   <!-- temporary placeholder – remove later -->
        >
          <source src="https://rbiz01.github.io/fuzzy-chainsaw/IntroVideo.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        
        <div class="video-overlay">
          <h1>   </h1>
          <div class="subtitle"></div>
        </div>
      </div>
    </header>

    <div class="links-grid">
      
      <a href="https://rbiz01.github.io/fuzzy-chainsaw/bounce.html" class="card">
        <div class="card-title">Bounce</div>
        <div class="card-desc">Jump to your Highest!</div>
      </a>

      <a href="https://rbiz01.github.io/fuzzy-chainsaw/bags.html" class="card">
        <div class="card-title">Bags</div>
        <div class="card-desc">Flicking Fun!</div>
      </a>

      <a href="https://rbiz01.github.io/fuzzy-chainsaw/faceoff.html" class="card">
        <div class="card-title">Face Off</div>
        <div class="card-desc">Team Guessing Game!</div>
      </a>

      <a href="https://rbiz01.github.io/fuzzy-chainsaw/mouseraces.html" class="card">
        <div class="card-title">Mouse Mayhem</div>
        <div class="card-desc">Who's the Fastest Mouse!</div>
      </a>

      <a href="https://rbiz01.github.io/fuzzy-chainsaw/spacerunner.html" class="card">
        <div class="card-title">Space Runner</div>
        <div class="card-desc">How Far Can You Get!</div>
      </a>

      <a href="https://rbiz01.github.io/fuzzy-chainsaw/tetris.html" class="card">
        <div class="card-title">Tetris</div>
        <div class="card-desc">Just the Classic!</div>
      </a>

      <a href="https://rbiz01.github.io/fuzzy-chainsaw/vines.html" class="card">
        <div class="card-title">Vines</div>
        <div class="card-desc">Watch Them Grow!</div>
      </a>

      <a href="https://rbiz01.github.io/fuzzy-chainsaw/tarot.html" class="card">
        <div class="card-title">Tarot Reading</div>
        <div class="card-desc">Let Me Read Your Cards!</div>
      </a>

    </div>      
    
    <footer>
      © 2026 Fuzzy-ChainSaw • Running on pure vibe & quantum entropy
    </footer>
  </div>

  <script>
    // Generate random stars
    const starsContainer = document.getElementById('stars');
    const numStars = 180;

    for (let i = 0; i < numStars; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      
      const size = Math.random() * 2.8 + 0.6;
      star.style.width = `${size}px`;
      star.style.height = star.style.width;
      
      star.style.left = `${Math.random() * 100}vw`;
      star.style.top = `${Math.random() * 100}vh`;
      
      const duration = Math.random() * 5 + 4;
      star.style.animationDuration = `${duration}s, ${80 + Math.random() * 80}s`;
      star.style.animationDelay = `${Math.random() * -80}s`;
      
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
