<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angry Tanks</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            touch-action: none;
            font-family: 'Press Start 2P', cursive;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            max-width: 720px;
            max-height: 1080px;
            object-fit: contain;
            image-rendering: pixelated;
            background: #000;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: #fff;
            text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000;
        }
        #score, #level, #stars, #highscore {
            position: absolute;
            right: 4vmin;
            background: rgba(0,0,0,0.6);
            padding: 1.5vmin 4vmin;
            border-radius: 3vmin;
            border: 0.8vmin solid;
        }
        #score  { top: 3vmin; font-size: 6vmin; border-color: #ffcc00; }
        #level  { top:11vmin; font-size: 4.2vmin; border-color: #00ffcc; }
        #stars  { top:19vmin; font-size: 4.2vmin; border-color: #ff6600; }
        #highscore { top:27vmin; font-size: 3.5vmin; border-color: #aa44ff; padding:1vmin 3vmin; }
        #balls {
            position: absolute;
            top: 3vmin;
            left: 4vmin;
            display: flex;
            gap: 2.5vmin;
            pointer-events: none;
        }
        .cannon-ball-icon {
            width: 8vmin;
            height: 8vmin;
            background: #333;
            border-radius: 50%;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.8), 0 2px 6px rgba(255,255,255,0.2);
            border: 0.5vmin solid #555;
        }
        .button {
            position: absolute;
            bottom: 6vmin;
            width: 18vmin;
            height: 18vmin;
            background: #ff4444;
            border: 1.4vmin solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10vmin;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 2.2vmin 0 #aa0000;
            transition: transform 0.1s;
        }
        .button:active {
            transform: translateY(1.1vmin);
            box-shadow: 0 1.1vmin 0 #aa0000;
        }
        #quit { left: 5vmin; }
        #restart { right: 5vmin; }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 9vmin;
            padding: 6vmin 10vmin;
            background: rgba(0,0,0,0.85);
            border: 1.6vmin solid #ffff00;
            border-radius: 4vmin;
            text-align: center;
            display: none;
            pointer-events: all;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="game"></canvas>
        
        <div id="ui">
            <div id="score">SCORE: 00000</div>
            <div id="level">LEVEL 1</div>
            <div id="stars">★☆☆</div>
            <div id="highscore">BEST: 00000</div>
            <div id="balls"></div>
            <div id="quit" class="button">⏹</div>
            <div id="restart" class="button">⟳</div>
            <div id="message"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // ────────────────────────────────────────────────
        // ANGRY TANKS – Full 25 levels – March 2026 fixed version
        // ────────────────────────────────────────────────

        const canvas = document.getElementById('game');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const starsEl = document.getElementById('stars');
        const highscoreEl = document.getElementById('highscore');
        const ballsEl = document.getElementById('balls');
        const messageEl = document.getElementById('message');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x224466);

        const camera = new THREE.OrthographicCamera(-360, 360, 640, -640, 0.1, 2000);
        camera.position.set(0, 0, 500);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        function resize() {
            const w = container.clientWidth, h = container.clientHeight;
            renderer.setSize(w, h, false);
        }
        resize();
        window.addEventListener('resize', resize);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        scene.add(new THREE.DirectionalLight(0xffeecc, 1).setPosition(100,200,100));

        const loader = new THREE.TextureLoader();

        const platformTex = loader.load('https://rbiz01.github.io/fuzzy-chainsaw/tanky_assets/platform.png');
        const tankTex     = loader.load('https://rbiz01.github.io/fuzzy-chainsaw/tanky_assets/tank1.png');
        const turretTex   = loader.load('https://rbiz01.github.io/fuzzy-chainsaw/tanky_assets/turret1.png');

        const platformMat = new THREE.MeshBasicMaterial({map:platformTex, transparent:true, side:THREE.DoubleSide, alphaTest:0.1});

        // ── Player tank ─────────────────────────────────────────────────────────
        const tankGroup = new THREE.Group();
        tankGroup.position.set(-220, -340, 10);
        scene.add(tankGroup);

        tankGroup.add(new THREE.Mesh(new THREE.PlaneGeometry(220,130), platformMat.clone()).setPosition(0,-55,-8).setRenderOrder(-2));
        tankGroup.add(new THREE.Mesh(new THREE.PlaneGeometry(160,90),   new THREE.MeshBasicMaterial({map:tankTex,   transparent:true, side:THREE.DoubleSide, alphaTest:0.05})).setPosition(0,10,0));
        
        const turretGroup = new THREE.Group();
        turretGroup.add(new THREE.Mesh(new THREE.PlaneGeometry(100,80), new THREE.MeshBasicMaterial({map:turretTex, transparent:true, side:THREE.DoubleSide, alphaTest:0.05})).setPosition(18,42,5));
        tankGroup.add(turretGroup);

        function getBarrelTip() {
            return new THREE.Vector3(65,18,0).applyMatrix4(turretGroup.matrixWorld);
        }

        // ── Controls ────────────────────────────────────────────────────────────
        let spring, trajectory;
        function createSpring() {
            const pts = Array(61).fill().map(()=>new THREE.Vector3());
            spring = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({color:0xff4444, linewidth:10})
            );
            spring.renderOrder = -1;
            scene.add(spring);
            spring.visible = false;
        }

        function createTrajectory() {
            const pts = Array(51).fill().map(()=>new THREE.Vector3());
            trajectory = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({color:0x88ff88, linewidth:6})
            );
            trajectory.renderOrder = 1;
            scene.add(trajectory);
            trajectory.visible = false;
        }

        // ── Game state ──────────────────────────────────────────────────────────
        let score = 0;
        let highScore = localStorage.getItem('angryTanksHighScore') || 0;
        let currentLevel = 1;
        let shotsFired = 0;
        let shotsMissed = 0;
        let projectile = null;
        let loadedBall = null;
        let velocity = new THREE.Vector3();
        let isDragging = false;
        let isFlying = false;
        let dragStartPos = new THREE.Vector2();
        let pullPos = new THREE.Vector3();
        let gameRunning = true;
        let levelCleared = false;
        let lastClearCheckTime = 0;
        const MAX_SHOTS = 3;
        const GRAVITY = 0.7;
        let windForce = 0;

        let enemies = [];
        let covers = [];

        // ── All 25 levels ───────────────────────────────────────────────────────
        const levels = [
            {enemies:[{x:180,y:-200}], theme:'flat', baseScore:100},
            {enemies:[{x:220,y:-200},{x:320,y:-200}], theme:'flat', baseScore:150},
            {enemies:[{x:180,y:-200},{x:320,y:-280},{x:420,y:-200}], theme:'flat', baseScore:200},
            {enemies:[{x:150,y:-180},{x:280,y:-280},{x:380,y:-150},{x:500,y:-250}], theme:'flat', baseScore:250},
            {enemies:[{x:120,y:-200},{x:250,y:-300},{x:380,y:-180},{x:480,y:-260},{x:550,y:-140}], theme:'flat', baseScore:300},
            {enemies:[{x:200,y:-150},{x:300,y:-100},{x:400,y:-150}], theme:'hilly', baseScore:350},
            {enemies:[{x:180,y:-250},{x:280,y:-180},{x:380,y:-250},{x:480,y:-180}], theme:'hilly', baseScore:400},
            {enemies:[{x:220,y:-300},{x:320,y:-220},{x:420,y:-300},{x:520,y:-220}], theme:'hilly', baseScore:450},
            {enemies:[{x:150,y:-120},{x:250,y:-280},{x:350,y:-120},{x:450,y:-280},{x:550,y:-120}], theme:'hilly', baseScore:500},
            {enemies:[{x:200,y:-100},{x:300,y:-250},{x:400,y:-100},{x:500,y:-250},{x:600,y:-100}], theme:'hilly', baseScore:550},
            {enemies:[{x:250,y:-180},{x:280,y:-180},{x:310,y:-180}], theme:'cluster', baseScore:600},
            {enemies:[{x:300,y:-250},{x:350,y:-200},{x:400,y:-250}], theme:'cluster', baseScore:650},
            {enemies:[{x:200,y:-300},{x:250,y:-250},{x:300,y:-300},{x:350,y:-250},{x:400,y:-300}], theme:'cluster', baseScore:700},
            {enemies:[{x:180,y:-220},{x:230,y:-220},{x:280,y:-220},{x:330,y:-220},{x:380,y:-220}], theme:'cluster', baseScore:750},
            {enemies:[{x:250,y:-150},{x:300,y:-200},{x:350,y:-150},{x:300,y:-100}], theme:'cluster', baseScore:800},
            {enemies:[{x:220,y:-350},{x:320,y:-300},{x:420,y:-350}], theme:'defended', baseScore:900},
            {enemies:[{x:200,y:-380},{x:300,y:-320},{x:400,y:-380},{x:500,y:-340}], theme:'defended', baseScore:950},
            {enemies:[{x:180,y:-400},{x:260,y:-360},{x:340,y:-360},{x:420,y:-400},{x:500,y:-380}], theme:'defended', baseScore:1000},
            {enemies:[{x:150,y:-420},{x:240,y:-380},{x:330,y:-360},{x:420,y:-380},{x:510,y:-420}], theme:'defended', baseScore:1050},
            {enemies:[{x:200,y:-450},{x:280,y:-410},{x:360,y:-370},{x:440,y:-410},{x:520,y:-450}], theme:'defended', baseScore:1100},
            {enemies:[{x:180,y:-380},{x:240,y:-340},{x:300,y:-360},{x:360,y:-340},{x:420,y:-380},{x:480,y:-360}], theme:'expert', baseScore:1200},
            {enemies:[{x:200,y:-400},{x:260,y:-370},{x:320,y:-340},{x:380,y:-370},{x:440,y:-400},{x:500,y:-370}], theme:'expert', baseScore:1250},
            {enemies:[{x:220,y:-420},{x:280,y:-390},{x:340,y:-360},{x:400,y:-390},{x:460,y:-420},{x:520,y:-390},{x:580,y:-410}], theme:'expert', baseScore:1300},
            {enemies:[{x:180,y:-440},{x:240,y:-410},{x:300,y:-380},{x:360,y:-410},{x:420,y:-440},{x:480,y:-410},{x:540,y:-390}], theme:'expert', baseScore:1350},
            {enemies:[{x:200,y:-460},{x:260,y:-430},{x:320,y:-400},{x:380,y:-430},{x:440,y:-460},{x:500,y:-430},{x:560,y:-410},{x:620,y:-440}], theme:'expert', baseScore:1400}
        ];

        function spawnLevel(idx) {
            enemies.forEach(e => scene.remove(e));
            covers.forEach(c => scene.remove(c));
            enemies = []; covers = [];

            const lvl = levels[idx % levels.length];

            lvl.enemies.forEach(p => {
                enemies.push(createEnemyTank(p.x, p.y, Math.random() < 0.1 + idx*0.02));
            });

            // theme setup (covers + wind) ──────────────────────────────
            switch(lvl.theme){
                case 'hilly':   createCover(280,-320,200,60); break;
                case 'defended':createCover(320,-360,400,120); createCover(450,-380,250,100); break;
                case 'expert':  createCover(350,-400,350,150); windForce = (Math.random()-0.5)*0.3; break;
                default: windForce = 0;
            }

            projectile = null; isFlying = followProjectile = false;
            turretGroup.rotation.z = 0;
            shotsFired = shotsMissed = 0;
            levelCleared = false;
            lastClearCheckTime = 0;
            updateBallsUI();
            createLoadedBall();
            resetCamera(true);
            levelEl.textContent = `LEVEL ${idx+1}`;
        }

        function createEnemyTank(x,y,armored=false){
            const g = new THREE.Group();
            g.add(new THREE.Mesh(new THREE.PlaneGeometry(220,130), platformMat.clone()).setPosition(0,-55,-8).setRenderOrder(-2));

            const body = new THREE.Mesh(
                new THREE.PlaneGeometry(160,90),
                new THREE.MeshBasicMaterial({map:tankTex, transparent:true, side:THREE.DoubleSide, alphaTest:0.05})
            );
            body.scale.x = -1;
            body.position.set(0,10,0);
            g.add(body);

            const tur = new THREE.Mesh(
                new THREE.PlaneGeometry(100,80),
                new THREE.MeshBasicMaterial({map:turretTex, transparent:true, side:THREE.DoubleSide, alphaTest:0.05})
            );
            tur.scale.x = -1;
            tur.position.set(-18,42,5);
            g.add(tur);

            g.position.set(x,y,5);
            g.userData = {alive:true, armored, hitbox:new THREE.Box3(new THREE.Vector3(-60,-35,-10), new THREE.Vector3(60,35,10)), health:armored?2:1};
            scene.add(g);
            return g;
        }

        function createCover(x,y,w=300,h=80){
            const c = new THREE.Mesh(new THREE.PlaneGeometry(w,h), platformMat.clone());
            c.position.set(x,y,-5);
            c.renderOrder = -1;
            scene.add(c);
            covers.push(c);
        }

        // ── Controls & input ────────────────────────────────────────────────────
        function getPointerPos(e){
            const r = canvas.getBoundingClientRect();
            const x = e.touches?.[0]?.clientX ?? e.clientX;
            const y = e.touches?.[0]?.clientY ?? e.clientY;
            return {x: (x-r.left)/r.width*720-360, y: -(y-r.top)/r.height*1280+640};
        }

        function onDown(e){
            e.preventDefault();
            if(!gameRunning || isFlying || isDragging) return;
            const pos = getPointerPos(e);
            const dx = pos.x - tankGroup.position.x;
            const dy = pos.y - tankGroup.position.y;
            if(Math.abs(dx)<120 && Math.abs(dy+10)<85){
                isDragging = true;
                dragStartPos.set(pos.x, pos.y);
                pullPos.copy(getBarrelTip());
                spring.visible = true;
            }
        }

        function onMove(e){
            e.preventDefault();
            if(!isDragging) return;
            const pos = getPointerPos(e);
            let dx = pos.x - dragStartPos.x;
            let dy = pos.y - dragStartPos.y;
            let d = Math.hypot(dx,dy);
            if(d>150){ dx*=150/d; dy*=150/d; }
            pullPos.set(dragStartPos.x+dx, dragStartPos.y+dy, 0);

            const tip = getBarrelTip();
            const dyFromTip = pullPos.y - tip.y;
            turretGroup.rotation.z = THREE.MathUtils.clamp(dyFromTip*0.009, -Math.PI/5.5, Math.PI/5.5);

            updateSpring(tip, pullPos);

            const stretch = tip.distanceTo(pullPos);
            if(stretch > 45){
                const dir = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,0,1), turretGroup.rotation.z);
                updateTrajectory(tip, dir.normalize().multiplyScalar(stretch*0.16));
            }
        }

        function onUp(e){
            e.preventDefault();
            if(!isDragging) return;
            isDragging = false;
            spring.visible = trajectory.visible = false;

            const tip = getBarrelTip();
            const stretch = tip.distanceTo(pullPos);
            if(stretch < 45) return;

            const dir = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,0,1), turretGroup.rotation.z);
            velocity.copy(dir.normalize().multiplyScalar(stretch*0.16));
            velocity.x += windForce;

            turretGroup.rotation.z += 0.18;
            setTimeout(()=>turretGroup.rotation.z -= 0.18, 140);

            createProjectile(tip);
            isFlying = followProjectile = true;
            if(loadedBall){ scene.remove(loadedBall); loadedBall = null; }
            shotsFired++;
            updateBallsUI();
        }

        canvas.addEventListener('mousedown', onDown);
        canvas.addEventListener('mousemove', onMove);
        canvas.addEventListener('mouseup', onUp);
        canvas.addEventListener('touchstart', onDown, {passive:false});
        canvas.addEventListener('touchmove', onMove, {passive:false});
        canvas.addEventListener('touchend', onUp, {passive:false});

        // ── Reset / Quit ────────────────────────────────────────────────────────
        document.getElementById('restart').onclick = ()=>{
            score = 0; currentLevel = 1; shotsFired = shotsMissed = 0;
            setNewBackground(); spawnLevel(0); updateUI(); gameRunning = true;
        };

        document.getElementById('quit').onclick = ()=>{
            window.location.href = 'https://rbiz01.github.io/fuzzy-chainsaw/';
        };

        // ── Core loop ───────────────────────────────────────────────────────────
        function animate(){
            requestAnimationFrame(animate);
            if(!gameRunning) return renderer.render(scene, camera);

            if(isFlying && projectile){
                velocity.y -= GRAVITY;
                velocity.x += windForce*0.1;
                projectile.position.add(velocity);

                if(projectile.position.y < -375){
                    projectile.position.y = -375;
                    velocity.y *= -0.42;
                    velocity.x *= 0.78;
                    velocity.multiplyScalar(0.94);
                    if(Math.abs(velocity.y)<7 && Math.abs(velocity.x)<6){
                        resetAfterShot(enemies.length === 0);
                    }
                }

                checkCollisions();
            }

            // Level complete delay (500 ms after stop)
            const now = performance.now();
            if(!levelCleared && !isFlying && enemies.length === 0){
                if(lastClearCheckTime === 0) lastClearCheckTime = now;
                else if(now - lastClearCheckTime > 500) levelComplete();
            } else {
                lastClearCheckTime = 0;
            }

            renderer.render(scene, camera);
        }

        function init(){
            highscoreEl.textContent = `BEST: ${highScore.toString().padStart(5,'0')}`;
            createSpring();
            createTrajectory();
            setNewBackground();
            spawnLevel(0);
            updateUI();
            animate();
            setTimeout(()=>showMessage("PULL → AIM → RELEASE!\n3 shots per level", "#ffffff", 5000), 400);
        }

        init();
    </script>
</body>
</html>
