<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angry Tanks</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            touch-action: none;
            font-family: 'Press Start 2P', cursive;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            max-height: 100vh;
            max-width: 100vw;
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: #fff;
            text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000;
        }
        #score {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 28px;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 15px;
            border: 4px solid #ffcc00;
        }
        #level {
            position: absolute;
            top: 90px;
            right: 30px;
            font-size: 22px;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 15px;
            border: 4px solid #00ffcc;
        }
        .button {
            position: absolute;
            bottom: 30px;
            width: 80px;
            height: 80px;
            background: #ff4444;
            border: 6px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 10px 0 #aa0000;
            transition: transform 0.1s;
        }
        .button:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #aa0000;
        }
        #quit {
            left: 30px;
        }
        #restart {
            right: 30px;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            padding: 30px 60px;
            background: rgba(0,0,0,0.85);
            border: 8px solid #ffff00;
            border-radius: 20px;
            text-align: center;
            display: none;
            pointer-events: all;
        }
        .slingshot {
            position: absolute;
            bottom: 180px;
            left: 120px;
            width: 60px;
            height: 180px;
            background: linear-gradient(#555, #222);
            border-radius: 10px;
            box-shadow: 0 0 20px #ffcc00;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="game"></canvas>
        
        <div id="ui">
            <div id="score">SCORE: 00000</div>
            <div id="level">LEVEL 1</div>
            
            <!-- Slingshot visual (HTML for nice look) -->
            <div class="slingshot"></div>
            
            <!-- Buttons -->
            <div id="quit" class="button">⏹</div>
            <div id="restart" class="button">⟳</div>
            
            <!-- Message overlay -->
            <div id="message"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // =============== ANGRY TANKS - Three.js Edition ===============
        // Vertical mobile-ready (720x1280 aspect), touch + mouse support
        // Beautiful colorful 3D scene with orthographic camera (2D gameplay feel)
        // Tanks = colorful ammo projectiles, Enemies = enemy tank bases

        const container = document.getElementById('container');
        const canvas = document.getElementById('game');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const messageEl = document.getElementById('message');
        const quitBtn = document.getElementById('quit');
        const restartBtn = document.getElementById('restart');

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Beautiful sky blue

        // Orthographic camera for perfect 2D Angry Birds feel
        const aspect = 720 / 1280;
        let width = 720;
        const camera = new THREE.OrthographicCamera(-width/2, width/2, width/(2*aspect), -width/(2*aspect), 0.1, 1000);
        camera.position.z = 500;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(720, 1280);
        container.appendChild(renderer.domElement);

        // Lighting for beautiful colors
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffeecc, 1);
        sunLight.position.set(100, 200, 100);
        scene.add(sunLight);

        // Ground (green battlefield)
        const groundGeo = new THREE.PlaneGeometry(800, 100);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x3a9d23, shininess: 10 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -400;
        scene.add(ground);

        // Add some grass detail
        const grass = new THREE.Mesh(
            new THREE.PlaneGeometry(800, 60),
            new THREE.MeshPhongMaterial({ color: 0x2e7d1f })
        );
        grass.rotation.x = -Math.PI / 2;
        grass.position.y = -380;
        scene.add(grass);

        // Slingshot base (visual)
        const slingshotBase = new THREE.Mesh(
            new THREE.BoxGeometry(60, 120, 30),
            new THREE.MeshPhongMaterial({ color: 0x555555, shininess: 30 })
        );
        slingshotBase.position.set(-220, -380, 0);
        scene.add(slingshotBase);

        // Slingshot rubber band (two lines)
        const rubberMat = new THREE.LineBasicMaterial({ color: 0x111111, linewidth: 8 });
        const rubberPoints = [new THREE.Vector3(-250, -300, 0), new THREE.Vector3(-190, -300, 0)];
        const rubberGeo = new THREE.BufferGeometry().setFromPoints(rubberPoints);
        const rubberBand = new THREE.Line(rubberGeo, rubberMat);
        scene.add(rubberBand);

        // Game variables
        let score = 0;
        let currentLevel = 1;
        let ammo;
        let enemies = [];
        let velocity = new THREE.Vector3();
        let isDragging = false;
        let dragStartPos = new THREE.Vector2();
        let gameRunning = true;
        let tryAgainCount = 0;
        const MAX_TRIES = 3;
        const GRAVITY = 0.6;

        // Level configurations (easy to expand)
        const levels = [
            { enemies: [{x:180,y:-200}, {x:320,y:-280}, {x:420,y:-180}] },
            { enemies: [{x:150,y:-180}, {x:280,y:-280}, {x:380,y:-150}, {x:500,y:-250}] },
            { enemies: [{x:120,y:-200}, {x:250,y:-300}, {x:380,y:-180}, {x:480,y:-260}, {x:550,y:-140}] }
        ];

        function createAmmo() {
            const group = new THREE.Group();
            
            // Tank body (green with yellow stripes)
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(50, 28, 30),
                new THREE.MeshPhongMaterial({ color: 0x00aa00, shininess: 50 })
            );
            group.add(body);
            
            // Turret
            const turret = new THREE.Mesh(
                new THREE.BoxGeometry(30, 20, 25),
                new THREE.MeshPhongMaterial({ color: 0x008800 })
            );
            turret.position.set(8, 15, 0);
            group.add(turret);
            
            // Cannon barrel
            const barrel = new THREE.Mesh(
                new THREE.CylinderGeometry(6, 6, 40, 16),
                new THREE.MeshPhongMaterial({ color: 0x333333 })
            );
            barrel.rotation.z = Math.PI / 2;
            barrel.position.set(25, 15, 0);
            group.add(barrel);
            
            group.position.set(-220, -280, 10);
            group.userData = { alive: true, type: 'ammo' };
            scene.add(group);
            return group;
        }

        function createEnemyTank(x, y) {
            const group = new THREE.Group();
            
            // Red enemy tank body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(65, 32, 35),
                new THREE.MeshPhongMaterial({ color: 0xcc0000, shininess: 40 })
            );
            group.add(body);
            
            // Enemy turret (darker)
            const turret = new THREE.Mesh(
                new THREE.BoxGeometry(40, 25, 30),
                new THREE.MeshPhongMaterial({ color: 0x880000 })
            );
            turret.position.set(-5, 20, 0);
            group.add(turret);
            
            // Enemy barrel
            const barrel = new THREE.Mesh(
                new THREE.CylinderGeometry(7, 7, 45, 16),
                new THREE.MeshPhongMaterial({ color: 0x222222 })
            );
            barrel.rotation.z = Math.PI / 2;
            barrel.position.set(-25, 20, 0);
            group.add(barrel);
            
            group.position.set(x, y, 5);
            group.userData = { alive: true, type: 'enemy', health: 1 };
            scene.add(group);
            return group;
        }

        function spawnLevel(levelIndex) {
            // Clear old enemies
            enemies.forEach(e => scene.remove(e));
            enemies = [];
            
            const config = levels[levelIndex % levels.length];
            config.enemies.forEach(pos => {
                const tank = createEnemyTank(pos.x, pos.y);
                enemies.push(tank);
            });
            
            // Reset ammo
            if (ammo) scene.remove(ammo);
            ammo = createAmmo();
            velocity.set(0, 0, 0);
            isDragging = false;
        }

        function updateUI() {
            scoreEl.textContent = `SCORE: ${String(score).padStart(5, '0')}`;
            levelEl.textContent = `LEVEL ${currentLevel}`;
        }

        function showMessage(text, color = '#ffff00', duration = 2000) {
            messageEl.style.color = color;
            messageEl.style.borderColor = color;
            messageEl.textContent = text;
            messageEl.style.display = 'block';
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, duration);
        }

        function checkCollisions() {
            if (!ammo || !ammo.userData.alive) return;
            
            const ammoBox = new THREE.Box3().setFromObject(ammo);
            
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                if (!enemy.userData.alive) continue;
                
                const enemyBox = new THREE.Box3().setFromObject(enemy);
                
                if (ammoBox.intersectsBox(enemyBox)) {
                    // Hit!
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                    score += 500;
                    updateUI();
                    
                    // Explosion effect
                    createExplosion(enemy.position);
                    
                    // Knockback on ammo
                    velocity.multiplyScalar(0.4);
                    
                    if (enemies.length === 0) {
                        levelComplete();
                    }
                    return;
                }
            }
        }

        function createExplosion(pos) {
            const particles = [];
            for (let i = 0; i < 25; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(8, 6, 6),
                    new THREE.MeshPhongMaterial({ color: Math.random() > 0.5 ? 0xff8800 : 0xffff00 })
                );
                p.position.copy(pos);
                p.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 18,
                    (Math.random() - 0.5) * 18 + 10,
                    0
                );
                scene.add(p);
                particles.push(p);
            }
            
            // Remove after animation
            let life = 25;
            const anim = setInterval(() => {
                life--;
                particles.forEach((p, i) => {
                    p.position.add(p.velocity);
                    p.velocity.y -= 1.2;
                    p.scale.multiplyScalar(0.92);
                });
                if (life <= 0) {
                    clearInterval(anim);
                    particles.forEach(p => scene.remove(p));
                }
            }, 16);
        }

        function resetAmmo() {
            if (ammo) scene.remove(ammo);
            ammo = createAmmo();
            velocity.set(0, 0, 0);
            tryAgainCount++;
            
            if (tryAgainCount >= MAX_TRIES) {
                gameOver();
            }
        }

        function levelComplete() {
            gameRunning = false;
            showMessage("LEVEL CLEAR!", "#00ffcc", 2500);
            
            setTimeout(() => {
                currentLevel++;
                tryAgainCount = 0;
                spawnLevel(currentLevel - 1);
                gameRunning = true;
                updateUI();
            }, 2600);
        }

        function gameOver() {
            gameRunning = false;
            showMessage("GAME OVER", "#ff4444", 4000);
            setTimeout(() => {
                // Auto restart
                currentLevel = 1;
                score = 0;
                tryAgainCount = 0;
                spawnLevel(0);
                gameRunning = true;
                updateUI();
            }, 4200);
        }

        // Input handling (Mouse + Touch)
        let pointerDown = false;
        
        function getPointerPos(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            let clientX, clientY;
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            return {
                x: (clientX - rect.left) * (720 / rect.width) - 360,
                y: -(clientY - rect.top) * (1280 / rect.height) + 640
            };
        }

        function onPointerDown(e) {
            if (!gameRunning || !ammo) return;
            
            const pos = getPointerPos(e);
            const ammoPos = ammo.position;
            
            const dx = pos.x - ammoPos.x;
            const dy = pos.y - ammoPos.y;
            
            if (Math.sqrt(dx*dx + dy*dy) < 60) {
                pointerDown = true;
                isDragging = true;
                dragStartPos.set(pos.x, pos.y);
            }
        }

        function onPointerMove(e) {
            if (!isDragging || !ammo) return;
            
            const pos = getPointerPos(e);
            
            // Limit drag distance (classic Angry Birds feel)
            let dx = pos.x - dragStartPos.x;
            let dy = pos.y - dragStartPos.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 160) {
                const ratio = 160 / dist;
                dx *= ratio;
                dy *= ratio;
            }
            
            ammo.position.x = dragStartPos.x + dx;
            ammo.position.y = dragStartPos.y + dy;
            
            // Update rubber band
            const points = rubberBand.geometry.attributes.position.array;
            points[0] = dragStartPos.x + dx * 0.3 - 20;
            points[1] = dragStartPos.y + dy * 0.3;
            points[3] = dragStartPos.x + dx * 0.3 + 20;
            points[4] = dragStartPos.y + dy * 0.3;
            rubberBand.geometry.attributes.position.needsUpdate = true;
        }

        function onPointerUp(e) {
            if (!isDragging || !ammo) return;
            
            isDragging = false;
            pointerDown = false;
            
            const currentPos = ammo.position;
            
            // Calculate launch velocity (opposite of drag direction)
            velocity.x = (dragStartPos.x - currentPos.x) * 0.22;
            velocity.y = (dragStartPos.y - currentPos.y) * 0.22;
            
            // Reset rubber band
            const points = rubberBand.geometry.attributes.position.array;
            points[0] = -250; points[1] = -300;
            points[3] = -190; points[4] = -300;
            rubberBand.geometry.attributes.position.needsUpdate = true;
        }

        // Event listeners
        renderer.domElement.addEventListener('mousedown', onPointerDown);
        renderer.domElement.addEventListener('mousemove', onPointerMove);
        renderer.domElement.addEventListener('mouseup', onPointerUp);
        renderer.domElement.addEventListener('touchstart', onPointerDown);
        renderer.domElement.addEventListener('touchmove', onPointerMove);
        renderer.domElement.addEventListener('touchend', onPointerUp);

        quitBtn.addEventListener('click', () => {
            window.location.reload();
        });
        
        restartBtn.addEventListener('click', () => {
            score = 0;
            currentLevel = 1;
            tryAgainCount = 0;
            spawnLevel(0);
            updateUI();
            gameRunning = true;
        });

        // Main game loop
        function animate() {
            requestAnimationFrame(animate);
            
            if (!gameRunning || !ammo) {
                renderer.render(scene, camera);
                return;
            }
            
            // Physics
            if (!isDragging) {
                velocity.y -= GRAVITY;
                ammo.position.x += velocity.x;
                ammo.position.y += velocity.y;
                
                // Gentle rotation for realism
                ammo.rotation.z = Math.atan2(velocity.y, velocity.x) * 0.6;
            }
            
            // Ground bounce (soft)
            if (ammo.position.y < -380) {
                ammo.position.y = -380;
                velocity.y *= -0.35;
                velocity.x *= 0.8;
                
                if (Math.abs(velocity.y) < 3) {
                    velocity.set(0, 0, 0);
                }
            }
            
            // Out of bounds reset
            if (ammo.position.x > 500 || ammo.position.x < -400 || ammo.position.y < -600) {
                resetAmmo();
            }
            
            checkCollisions();
            updateUI();
            
            renderer.render(scene, camera);
        }

        // Start the game
        function initGame() {
            spawnLevel(0);
            updateUI();
            animate();
            
            // Welcome message
            setTimeout(() => {
                showMessage("DRAG & LAUNCH!", "#ffffff", 1800);
            }, 800);
        }

        // Responsive resize
        window.addEventListener('resize', () => {
            const newAspect = window.innerWidth / window.innerHeight;
            renderer.setSize(720, 1280);
            camera.left = -360;
            camera.right = 360;
            camera.top = 640;
            camera.bottom = -640;
            camera.updateProjectionMatrix();
        });

        // Boot the game
        initGame();
    </script>
</body>
</html>
