<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Angry Tanks</title>

    <!-- Tone.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            touch-action: none;
            font-family: 'Press Start 2P', cursive;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            max-width: 720px;
            max-height: 1080px;
            object-fit: contain;
            image-rendering: pixelated;
            background: #000;
        }

        #ui {
            position: absolute;
            inset: 0;
            pointer-events: none;
            color: #fff;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 2vmin;
            gap: 1.8vmin;
            font-family: 'Press Start 2P', cursive;
            user-select: none;
        }

        .ui-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5vmin;
            background: rgba(0,0,0,0.65);
            padding: 1.4vmin 6vmin;
            border-radius: 3vmin;
            border: 0.7vmin solid #444;
            min-width: 260px;
            max-width: 80vw;
            box-sizing: border-box;
            pointer-events: none;
        }

        .ui-row.single {
            gap: 0;
            padding: 1.2vmin 5vmin;
        }

        #row1 { border-color: #ffcc00; font-size: 5.6vmin; }
        #row2 { border-color: #00ffcc; font-size: 4.8vmin; }
        #row3 { border-color: #aa44ff; font-size: 4.2vmin; gap: 6vmin; }

        #score    { color: #ffeb3b; white-space: nowrap; }
        #level    { color: #00ffe9; }
        #stars    { color: #ff9800; letter-spacing: 0.6vmin; }
        #highscore{ color: #d0aaff; }

        #balls {
            display: flex;
            gap: 2.4vmin;
            pointer-events: none;
        }

        .cannon-ball-icon {
            width: 7.5vmin;
            height: 7.5vmin;
            background: #222;
            border-radius: 50%;
            border: 0.6vmin solid #555;
            box-shadow: inset 0 3px 8px #000, 0 1px 4px #fff4;
        }

        .button {
            position: absolute;
            bottom: 5vmin;
            width: 17vmin;
            height: 17vmin;
            border: 1.3vmin solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9vmin;
            pointer-events: all;
            box-shadow: 0 2.4vmin 0 #000000aa;
            transition: all 0.12s;
        }

        .button:active {
            transform: translateY(1.2vmin);
            box-shadow: 0 1.2vmin 0 #000000aa;
        }

        #quit    { left: 5vmin; background: #e53935; }
        #restart { right: 5vmin; background: #43a047; }
        #preview {
            left: 50%;
            transform: translateX(-50%);
            background: #3f51b5;
        }
        #preview.active {
            background: #5c6bc0;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8.5vmin;
            padding: 5vmin 8vmin;
            background: rgba(0,0,0,0.88);
            border: 1.4vmin solid #ffeb3b;
            border-radius: 3.5vmin;
            text-align: center;
            display: none;
            pointer-events: all;
            white-space: pre-line;
            line-height: 1.4;
            z-index: 90;
        }

        .start-screen {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: all;
            z-index: 100;
            color: #fff;
            text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000;
        }

        .start-button {
            font-size: 9vmin;
            line-height: 1.35;
            text-align: center;
            padding: 7vmin 16vmin;
            background: linear-gradient(#ff4444, #cc0000);
            border: 1.5vmin solid #ffff00;
            border-radius: 5vmin;
            box-shadow: 0 1.8vmin 0 #880000, inset 0 0.9vmin 1.6vmin rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            margin-bottom: 5vmin;
            white-space: pre-line;
        }

        .start-button:active {
            transform: translateY(0.9vmin);
            box-shadow: 0 0.9vmin 0 #880000;
        }

        .start-hint {
            font-size: 4vmin;
            color: #88ff88;
            opacity: 0.85;
            max-width: 80%;
            text-align: center;
        }

        /* Damage bar – moved below BEST row */
        #damage-bar-container {
            width: 78vw;
            max-width: 460px;
            height: 5.5vmin;
            background: #1a1a1a;
            border: 0.7vmin solid #555;
            border-radius: 3vmin;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.6), inset 0 1.5px 5px rgba(255,255,255,0.08);
            pointer-events: none;
            margin-top: 1vmin;
        }

        #damage-bar {
            height: 100%;
            width: 100%;
            transition: width 0.45s ease-out, background 0.45s ease;
            background: linear-gradient(90deg, #00e676, #66bb6a);
            box-shadow: inset 0 1px 4px rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="game"></canvas>
        <div id="ui">
            <div id="row1" class="ui-row single">
                <div id="score">SCORE: 00000</div>
            </div>

            <div id="row2" class="ui-row">
                <div id="balls"></div>
                <div id="level">LEVEL 1</div>
            </div>

            <div id="row3" class="ui-row">
                <div id="highscore">BEST: 00000</div>
                <div id="stars">★☆☆</div>
            </div>

            <!-- Damage bar moved here – below BEST row -->
            <div id="damage-bar-container">
                <div id="damage-bar"></div>
            </div>

            <div id="quit" class="button">⏹</div>
            <div id="restart" class="button">⟳</div>
            <div id="preview" class="button">📷</div>

            <div id="message"></div>

            <div id="start-screen" class="start-screen">
                <div class="start-button">START GAME
(pull & aim to shoot)</div>
                <div class="start-hint">Tap to begin • Fullscreen mode</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://rbiz01.github.io/fuzzy-chainsaw/tanky_assets/levels.js"></script>

    <script>
        if (typeof window.levels === 'undefined' || !Array.isArray(window.levels) || window.levels.length === 0) {
            console.warn("No levels loaded - using fallback");
            window.levels = [{
                enemies: [
                    {x: 400, y: -200},
                    {x: 700, y: -150},
                    {x: 1000, y: -250},
                    {x: 1300, y: -180}
                ],
                baseScore: 1000,
                theme: 'normal'
            }];
        }

        const container   = document.getElementById('container');
        const canvas      = document.getElementById('game');
        const scoreEl     = document.getElementById('score');
        const levelEl     = document.getElementById('level');
        const starsEl     = document.getElementById('stars');
        const highscoreEl = document.getElementById('highscore');
        const ballsEl     = document.getElementById('balls');
        const messageEl   = document.getElementById('message');
        const quitBtn     = document.getElementById('quit');
        const restartBtn  = document.getElementById('restart');
        const previewBtn  = document.getElementById('preview');
        const startScreen = document.getElementById('start-screen');
        const damageBar   = document.getElementById('damage-bar');

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-360, 360, 640, -640, 0.1, 2000);
        camera.position.set(0, 0, 500);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        function updateRendererSize() {
            renderer.setSize(container.clientWidth, container.clientHeight, false);
        }
        updateRendererSize();
        window.addEventListener('resize', updateRendererSize);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffeecc, 1);
        sun.position.set(100, 200, 100);
        scene.add(sun);

        const textureLoader = new THREE.TextureLoader();

        const groundTexture = textureLoader.load('https://rbiz01.github.io/fuzzy-chainsaw/tanky_assets/ground.png');
        groundTexture.magFilter = THREE.NearestFilter;
        groundTexture.minFilter = THREE.NearestFilter;
        groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping;

        const groundMaterial = new THREE.MeshBasicMaterial({
            map: groundTexture,
            transparent: true,
            alphaTest: 0.01
        });

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(4500, 500), groundMaterial);
        ground.position.set(0, -550, -50);
        ground.renderOrder = -5;
        scene.add(ground);

        const backgrounds = [];
        for (let i = 1; i <= 13; i++) {
            const tex = textureLoader.load(`https://rbiz01.github.io/fuzzy-chainsaw/tanky_assets/bg${i}.jpg`);
            tex.magFilter = THREE.LinearFilter;
            tex.minFilter = THREE.LinearFilter;
            backgrounds.push(tex);
        }

        const bgGeometry = new THREE.PlaneGeometry(4500, 1500);
        const bgMaterial1 = new THREE.MeshBasicMaterial({ transparent: true, opacity: 1.0 });
        const bgMaterial2 = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.0 });
        const skyBackground1 = new THREE.Mesh(bgGeometry, bgMaterial1);
        const skyBackground2 = new THREE.Mesh(bgGeometry, bgMaterial2);
        skyBackground1.position.set(0, 0, -100);
        skyBackground2.position.set(0, 0, -101);
        scene.add(skyBackground1);
        scene.add(skyBackground2);

        let currentBgIndex = -1;
        let previousBgIndex = -1;
        let bgFadeProgress = 0;
        let bgFadeDirection = 1;

        function setNewBackground() {
            let idx;
            do { idx = Math.floor(Math.random() * 13); } while (idx === previousBgIndex);
            previousBgIndex = currentBgIndex;
            currentBgIndex = idx;
            bgMaterial1.map = backgrounds[currentBgIndex];
            bgMaterial2.map = backgrounds[previousBgIndex !== -1 ? previousBgIndex : currentBgIndex];
            bgMaterial1.needsUpdate = bgMaterial2.needsUpdate = true;
            bgFadeProgress = 0;
            bgFadeDirection = 1;
        }

        function updateBackgroundFade() {
            if (bgFadeDirection === 1) {
                bgMaterial1.opacity = Math.min(1.0, bgFadeProgress);
                bgMaterial2.opacity = Math.max(0.0, 1.0 - bgFadeProgress);
                bgFadeProgress += 0.025;
                if (bgFadeProgress >= 1.0) bgFadeDirection = 0;
            }
        }

        const platformTexture = textureLoader.load('https://rbiz01.github.io/fuzzy-chainsaw/tanky_assets/platform.png');
        platformTexture.magFilter = THREE.NearestFilter;
        platformTexture.minFilter = THREE.NearestFilter;
        platformTexture.transparent = true;
        platformTexture.premultiplyAlpha = true;

        const platformMaterial = new THREE.MeshBasicMaterial({
            map: platformTexture,
            transparent: true,
            side: THREE.DoubleSide,
            alphaTest: 0.1,
            color: 0xffffff
        });

        const tankTexture   = textureLoader.load('https://rbiz01.github.io/fuzzy-chainsaw/tanky_assets/tank1.png');
        const turretTexture = textureLoader.load('https://rbiz01.github.io/fuzzy-chainsaw/tanky_assets/turret1.png');
        tankTexture.magFilter = tankTexture.minFilter = THREE.NearestFilter;
        turretTexture.magFilter = turretTexture.minFilter = THREE.NearestFilter;

        const tankGroup = new THREE.Group();
        const playerPlatform = new THREE.Mesh(new THREE.PlaneGeometry(220, 130), platformMaterial);
        playerPlatform.position.set(0, -55, -8);
        playerPlatform.renderOrder = -2;
        tankGroup.add(playerPlatform);

        const tankSprite = new THREE.Mesh(
            new THREE.PlaneGeometry(160, 90),
            new THREE.MeshBasicMaterial({ map: tankTexture, transparent: true, side: THREE.DoubleSide, alphaTest: 0.05 })
        );
        tankSprite.position.set(0, 10, 0);
        tankGroup.add(tankSprite);

        const turretGroup = new THREE.Group();
        const turretSprite = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 80),
            new THREE.MeshBasicMaterial({ map: turretTexture, transparent: true, side: THREE.DoubleSide, alphaTest: 0.05 })
        );
        turretSprite.position.set(18, 42, 5);
        turretGroup.add(turretSprite);
        tankGroup.add(turretGroup);

        tankGroup.position.set(-220, -340, 10);
        scene.add(tankGroup);

        function getBarrelTip() {
            return new THREE.Vector3(65, 18, 0).applyMatrix4(turretGroup.matrixWorld);
        }

        let spring, trajectoryLine;
        let isPreviewActive = false;
        let previewPhase = 0;
        let previewStartTime = 0;

        function createSpring() {
            const pts = Array(61).fill().map(() => new THREE.Vector3());
            const geo = new THREE.BufferGeometry().setFromPoints(pts);
            spring = new THREE.Line(
                geo,
                new THREE.LineBasicMaterial({
                    color: 0xffffff,
                    linewidth: 10,
                    transparent: true,
                    opacity: 0.8
                })
            );
            spring.renderOrder = -1;
            scene.add(spring);
            spring.visible = false;
        }

        function createTrajectoryLine() {
            const pts = Array(51).fill().map(() => new THREE.Vector3());
            const geo = new THREE.BufferGeometry().setFromPoints(pts);
            trajectoryLine = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x88ff88, linewidth: 6 }));
            trajectoryLine.renderOrder = 1;
            scene.add(trajectoryLine);
            trajectoryLine.visible = false;
        }

        function updateSpring(start, end) {
            if (!spring) return;
            const dir = new THREE.Vector3().subVectors(end, start);
            const len = dir.length();
            if (len < 25) { 
                spring.visible = false; 
                return; 
            }
            dir.normalize();
            const perp = new THREE.Vector3(-dir.y, dir.x, 0);
            const offsetStart = start.clone().addScaledVector(dir, -3);
            const offsetEnd = end.clone().addScaledVector(dir, -5);
            const pts = [];
            const coils = Math.min(14, len * 0.055);
            for (let i = 0; i <= 60; i++) {
                const t = i / 60;
                let p = offsetStart.clone().lerp(offsetEnd, t);
                const r = 7 * (1 - t * 0.25);
                const ang = t * coils * Math.PI * 2;
                p.add(perp.clone().multiplyScalar(Math.sin(ang) * r));
                pts.push(p);
            }
            spring.geometry.setFromPoints(pts);
            spring.geometry.attributes.position.needsUpdate = true;

            const MAX_STRETCH = 150;
            const stretchNorm = Math.min(len / MAX_STRETCH, 1);

            let r, g, b;
            if (stretchNorm < 0.4) {
                const t = stretchNorm / 0.4;
                r = 255;
                g = 255;
                b = Math.round(255 * (1 - t * 0.4));
            } else {
                const t = (stretchNorm - 0.4) / 0.6;
                r = 255;
                g = Math.round(255 * (1 - t * 0.92));
                b = Math.round(100 * (1 - t * 0.75));
            }

            const color = (r << 16) | (g << 8) | b;
            spring.material.color.setHex(color);

            spring.material.opacity = THREE.MathUtils.mapLinear(stretchNorm, 0, 1, 0.75, 1.0);

            spring.visible = true;
        }

        function updateTrajectory(startPos, velocity) {
            if (!trajectoryLine) return;
            const pts = [];
            let pos = startPos.clone();
            let vel = velocity.clone();

            const GRAVITY_TRAJ = 0.52;
            const TIME_STEP = 1.0;
            const MAX_STEPS = 140;

            for (let i = 0; i < MAX_STEPS; i++) {
                pts.push(pos.clone());

                vel.y -= GRAVITY_TRAJ * TIME_STEP;
                pos.add(vel.clone().multiplyScalar(TIME_STEP));

                if (pos.y < -800 || Math.abs(pos.x) > 4000) break;
            }

            trajectoryLine.geometry.setFromPoints(pts);
            trajectoryLine.geometry.attributes.position.needsUpdate = true;
            trajectoryLine.visible = true;
        }

        const DEFAULT_CAMERA_POS = new THREE.Vector3(0, 0, 500);
        const PREVIEW_START_X = 0;
        const PREVIEW_END_X = 1200;
        const PREVIEW_GO_DURATION = 4000;
        const PREVIEW_RETURN_DURATION = 2000;
        let followProjectile = false;

        const HOVER_AMPLITUDE = 10;
        const HOVER_SPEED = 0.0008;
        let hoverStartTime = performance.now();

        function resetCamera(immediate = false) {
            followProjectile = false;
            if (immediate) camera.position.copy(DEFAULT_CAMERA_POS);
        }

        let score = 0;
        let highScore = localStorage.getItem('angryTanksHighScore') || 0;
        let currentLevel = 1;
        let shotsUsed = 0;
        let projectile = null;
        let loadedBall = null;
        let velocity = new THREE.Vector3();
        let isDragging = false;
        let isFlying = false;
        let dragStartPos = new THREE.Vector2();
        let pullPos = new THREE.Vector3();
        let gameRunning = false;
        let gameStarted = false;
        let tryAgainCount = 0;
        const MAX_TRIES = 3;
        const GRAVITY = 0.52;
        let windForce = 0;
        let enemies = [];
        const ballIcons = [];
        let covers = [];
        let levelCleared = false;

        let playerHealth = 100;
        const maxPlayerHealth = 100;
        const DAMAGE_PER_HIT = 28;
        const PLAYER_HIT_FLASH_DURATION = 180;
        let enemyProjectiles = [];

        const ENEMY_FIRST_SHOT_MIN = 900;
        const ENEMY_FIRST_SHOT_MAX = 4800;
        const ENEMY_SHOT_INTERVAL_MIN = 2600;
        const ENEMY_SHOT_INTERVAL_MAX = 5200;
        const ENEMY_SHOOT_CHANCE = 0.64;
        const ENEMY_AIM_ACCURACY = 0.60;

        // Locked-in values from your tuning
        const ENEMY_MIN_ANGLE_DEG = 104;
        const ENEMY_MAX_ANGLE_DEG = 163;
        const ENEMY_MIN_POWER = 0.45;
        const ENEMY_MAX_POWER = 0.80;
        const ENEMY_POWER_MULTIPLIER = 0.50;
        const ENEMY_GRAVITY_MULTIPLIER = 1.20;

        let cannonSynth, enemyCannonSynth, explosionSynth;

        async function initSounds() {
            await Tone.start();
            console.log("Tone.js audio context started");

            // Player cannon sound (bright, punchy)
            cannonSynth = new Tone.Synth({
                oscillator: { type: "sawtooth" },
                envelope: { attack: 0.001, decay: 0.1, sustain: 0.05, release: 0.2 }
            }).toDestination();

            // Enemy cannon sound (lower, raspier, more aggressive)
            enemyCannonSynth = new Tone.Synth({
                oscillator: { type: "sawtooth", detune: -300 }, // lower and slightly detuned
                envelope: { attack: 0.002, decay: 0.08, sustain: 0.02, release: 0.15 }
            }).toDestination();

            const noise = new Tone.NoiseSynth({
                noise: { type: "white" },
                envelope: { attack: 0.005, decay: 0.4, sustain: 0, release: 0.3 }
            });

            const filter = new Tone.Filter({
                type: "lowpass",
                frequency: 800,
                Q: 1
            });

            const compressor = new Tone.Compressor(-24, 4);

            noise.chain(filter, compressor, Tone.Destination);

            explosionSynth = { noise, filter };
        }

        function playCannonFire() {
            if (!cannonSynth) return;
            cannonSynth.triggerAttackRelease("C2", "8n");
            cannonSynth.frequency.rampTo("G3", 0.08);
        }

        function playEnemyCannonFire() {
            if (!enemyCannonSynth) return;
            enemyCannonSynth.triggerAttackRelease("A1", "8n");
            enemyCannonSynth.frequency.rampTo("D3", 0.07);
        }

        function playExplosion() {
            if (!explosionSynth) return;
            const { noise, filter } = explosionSynth;

            noise.triggerAttackRelease("8n");
            filter.frequency.setValueAtTime(1200, Tone.now());
            filter.frequency.exponentialRampTo(200, 0.4);

            noise.volume.value = -6;
            noise.volume.linearRampTo(-60, 0.6);
        }

        function updateBallsUI() {
            ballIcons.forEach(el => ballsEl.removeChild(el));
            ballIcons.length = 0;
            const rem = MAX_TRIES - tryAgainCount;
            for (let i = 0; i < rem; i++) {
                const d = document.createElement('div');
                d.className = 'cannon-ball-icon';
                ballsEl.appendChild(d);
                ballIcons.push(d);
            }
        }

        function updateDamageBar() {
            const percent = playerHealth / maxPlayerHealth;
            damageBar.style.width = `${percent * 100}%`;

            let color;
            if (percent > 0.6) color = '#00e676';
            else if (percent > 0.3) color = '#ffeb3b';
            else color = '#ff1744';

            damageBar.style.background = `linear-gradient(90deg, ${color}, ${new THREE.Color(color).multiplyScalar(0.7).getStyle()})`;
        }

        function createLoadedBall() {
            if (loadedBall) scene.remove(loadedBall);
            loadedBall = new THREE.Mesh(
                new THREE.SphereGeometry(18, 16, 16),
                new THREE.MeshPhongMaterial({ color: 0x333333, shininess: 80, specular: 0x555555 })
            );
            loadedBall.position.copy(getBarrelTip());
            loadedBall.visible = false;
            scene.add(loadedBall);
        }

        function createProjectile(pos) {
            if (projectile) scene.remove(projectile);
            projectile = new THREE.Mesh(
                new THREE.SphereGeometry(18, 16, 16),
                new THREE.MeshPhongMaterial({ color: 0x333333, shininess: 80, specular: 0x555555 })
            );
            projectile.position.copy(pos);
            scene.add(projectile);
        }

        function createEnemyTank(x, y, armored = false) {
            const g = new THREE.Group();
            g.add(new THREE.Mesh(new THREE.PlaneGeometry(220,130), platformMaterial));
            g.children[0].position.set(0,-55,-8);
            g.children[0].renderOrder = -2;

            const body = new THREE.Mesh(
                new THREE.PlaneGeometry(160,90),
                new THREE.MeshBasicMaterial({ map: tankTexture, transparent: true, side: THREE.DoubleSide, alphaTest: 0.05 })
            );
            body.scale.x = -1;
            body.position.set(0,10,0);
            g.add(body);

            const tur = new THREE.Mesh(
                new THREE.PlaneGeometry(100,80),
                new THREE.MeshBasicMaterial({ map: turretTexture, transparent: true, side: THREE.DoubleSide, alphaTest: 0.05 })
            );
            tur.scale.x = -1;
            tur.position.set(-18,42,5);
            g.add(tur);

            g.position.set(x, y, 5);
            g.userData = {
                alive: true,
                armored: armored,
                hitbox: new THREE.Box3(new THREE.Vector3(-60,-35,-10), new THREE.Vector3(60,35,10)),
                health: armored ? 2 : 1,
                originalY: y,
                hoverPhase: Math.random() * Math.PI * 2
            };
            scene.add(g);
            return g;
        }

        function createEnemyProjectile(startPos, velocity) {
            const proj = new THREE.Mesh(
                new THREE.SphereGeometry(16, 14, 14),
                new THREE.MeshPhongMaterial({ color: 0x550000, shininess: 60 })
            );
            proj.position.copy(startPos);
            proj.position.z = 10;
            proj.userData = {
                velocity: velocity.clone(),
                owner: 'enemy'
            };
            scene.add(proj);
            enemyProjectiles.push(proj);
        }

        function spawnLevel(levelIndex) {
            scene.traverse((obj) => {
                if (obj.isMesh && obj.material && obj.material.map === platformTexture) {
                    if (obj.geometry) obj.geometry.dispose();
                    if (obj.material) obj.material.dispose();
                    scene.remove(obj);
                }
            });

            enemies.forEach(e => scene.remove(e));
            covers.forEach(c => scene.remove(c));
            enemyProjectiles.forEach(p => scene.remove(p));
            enemies = [];
            covers = [];
            enemyProjectiles = [];

            const effectiveIndex = levelIndex % window.levels.length;
            const lvlData = window.levels[effectiveIndex];

            lvlData.enemies.forEach(p => {
                const armored = Math.random() < 0.1 + (effectiveIndex * 0.02);
                enemies.push(createEnemyTank(p.x, p.y, armored));
            });

            const now = performance.now();
            enemies.forEach(enemy => {
                const firstDelay = ENEMY_FIRST_SHOT_MIN + Math.random() * (ENEMY_FIRST_SHOT_MAX - ENEMY_FIRST_SHOT_MIN);
                enemy.userData.nextShotTime = now + firstDelay;
            });

            if (lvlData.theme === 'expert') {
                windForce = (Math.random() - 0.5) * 0.3;
            } else {
                windForce = 0;
            }

            if (projectile) scene.remove(projectile);
            projectile = null;
            isFlying = followProjectile = false;
            turretGroup.rotation.z = 0;
            tryAgainCount = shotsUsed = 0;
            levelCleared = false;
            playerHealth = maxPlayerHealth;
            updateDamageBar();
            updateBallsUI();
            createLoadedBall();
            resetCamera(true);
            levelEl.textContent = `LEVEL ${levelIndex + 1}`;

            tankGroup.userData.hoverPhase = Math.random() * Math.PI * 2;
        }

        function updateUI() {
            scoreEl.textContent = `SCORE: ${score.toString().padStart(5,'0')}`;
            highscoreEl.textContent = `BEST: ${highScore.toString().padStart(5,'0')}`;
            let stars = '☆☆☆';
            if (shotsUsed <= 1) stars = '★★★';
            else if (shotsUsed === 2) stars = '★★☆';
            starsEl.textContent = stars;
            updateBallsUI();
        }

        function showMessage(txt, col='#ffff00', dur=2000) {
            messageEl.style.color = messageEl.style.borderColor = col;
            messageEl.textContent = txt;
            messageEl.style.display = 'block';
            setTimeout(() => messageEl.style.display = 'none', dur);
        }

        function checkCollisions() {
            if (!projectile || !isFlying) return;
            const pBox = new THREE.Box3().setFromObject(projectile);
            let hitsThisFrame = 0;
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (!e.userData.alive) continue;
                const eBox = e.userData.hitbox.clone().applyMatrix4(e.matrixWorld);
                if (pBox.intersectsBox(eBox)) {
                    e.userData.health--;
                    if (e.userData.health <= 0) {
                        scene.remove(e);
                        enemies.splice(i,1);
                        e.userData.alive = false;
                        hitsThisFrame++;
                        playExplosion();
                    }
                    createExplosion(e.position, true);
                    velocity.multiplyScalar(0.45);
                }
            }
            if (hitsThisFrame > 1) {
                score += 500 * hitsThisFrame;
                showMessage(`${hitsThisFrame}x COMBO!`, '#ff00ff', 1000);
            }
        }

        function createExplosion(pos, chain = false) {
            for (let i = 0; i < (chain ? 15 : 25); i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(6,6,6),
                    new THREE.MeshPhongMaterial({ color: Math.random() > 0.5 ? 0xff8800 : 0xffff44 })
                );
                p.position.copy(pos);
                p.userData = {
                    vel: new THREE.Vector3(
                        (Math.random()-0.5)*25,
                        (Math.random()-0.5)*25 + 15,
                        0
                    ),
                    life: 35
                };
                scene.add(p);

                function updateParticle() {
                    p.userData.life--;
                    if (p.userData.life <= 0) {
                        scene.remove(p);
                        return;
                    }
                    p.position.add(p.userData.vel);
                    p.userData.vel.y -= 1.5;
                    p.scale.multiplyScalar(0.92);
                    if (chain && Math.random() < 0.1) {
                        const blastBox = new THREE.Box3().setFromObject(p);
                        for (let j = enemies.length - 1; j >= 0; j--) {
                            const e = enemies[j];
                            if (e.userData.alive) {
                                const eBox = e.userData.hitbox.clone().applyMatrix4(e.matrixWorld);
                                if (blastBox.intersectsBox(eBox)) {
                                    e.userData.health = Math.max(0, e.userData.health - 1);
                                    if (e.userData.health <= 0) {
                                        scene.remove(e);
                                        enemies.splice(j, 1);
                                        e.userData.alive = false;
                                        playExplosion();
                                    }
                                }
                            }
                        }
                    }
                    requestAnimationFrame(updateParticle);
                }
                requestAnimationFrame(updateParticle);
            }
        }

        function updateEnemyAI() {
            if (!gameRunning || levelCleared || isFlying) return;
            const now = performance.now();

            const minAngleRad = THREE.MathUtils.degToRad(ENEMY_MIN_ANGLE_DEG);
            const maxAngleRad = THREE.MathUtils.degToRad(ENEMY_MAX_ANGLE_DEG);

            enemies.forEach(enemy => {
                if (!enemy.userData.alive) return;
                if (now < enemy.userData.nextShotTime) return;

                if (Math.random() > ENEMY_SHOOT_CHANCE) {
                    enemy.userData.nextShotTime = now + 700 + Math.random() * 1500;
                    return;
                }

                const barrelTip = new THREE.Vector3(-65, 18, 0).applyMatrix4(enemy.matrixWorld);

                const toPlayer = tankGroup.position.clone().sub(enemy.position);
                const horizontalDist = Math.abs(toPlayer.x);
                toPlayer.y += 40 + Math.random() * 70;

                let vel;
                if (Math.random() < ENEMY_AIM_ACCURACY) {
                    const distFactor = THREE.MathUtils.clamp(horizontalDist / 800, 0.4, 1.8);
                    let basePower = 38 + distFactor * 58;
                    const randomPower = ENEMY_MIN_POWER + Math.random() * (ENEMY_MAX_POWER - ENEMY_MIN_POWER);
                    let power = basePower * randomPower * ENEMY_POWER_MULTIPLIER;
                    const dir = toPlayer.normalize();
                    vel = dir.multiplyScalar(power);
                    vel.x += windForce * 0.7;
                } else {
                    const randomAngle = minAngleRad + Math.random() * (maxAngleRad - minAngleRad);
                    const direction = new THREE.Vector3(Math.cos(randomAngle), Math.sin(randomAngle), 0);
                    const randomPower = ENEMY_MIN_POWER + Math.random() * (ENEMY_MAX_POWER - ENEMY_MIN_POWER);
                    let power = 40 + Math.random() * 45;
                    power *= randomPower * ENEMY_POWER_MULTIPLIER;
                    vel = direction.multiplyScalar(power);
                    vel.x += (Math.random() - 0.5) * 15;
                }

                const currentAngle = Math.atan2(vel.y, vel.x);
                if (currentAngle > maxAngleRad) {
                    const scale = Math.cos(maxAngleRad) / Math.cos(currentAngle);
                    vel.x *= scale;
                    vel.y = vel.x * Math.tan(maxAngleRad);
                }
                if (currentAngle < minAngleRad) {
                    const scale = Math.cos(minAngleRad) / Math.cos(currentAngle);
                    vel.x *= scale;
                    vel.y = vel.x * Math.tan(minAngleRad);
                }

                if (vel.y < 10 && horizontalDist > 500) {
                    vel.y += 20 + Math.random() * 30;
                }

                createEnemyProjectile(barrelTip, vel);

                // Play enemy shooting sound
                playEnemyCannonFire();

                const tur = enemy.children[2];
                const origRot = tur.rotation.z;
                tur.rotation.z -= 0.20;
                setTimeout(() => tur.rotation.z = origRot, 130);

                const nextDelay = ENEMY_SHOT_INTERVAL_MIN + Math.random() * (ENEMY_SHOT_INTERVAL_MAX - ENEMY_SHOT_INTERVAL_MIN);
                enemy.userData.nextShotTime = now + nextDelay;
            });
        }

        function checkPlayerHit() {
            if (!tankGroup.userData.hitbox) {
                tankGroup.userData.hitbox = new THREE.Box3(new THREE.Vector3(-90,-80,-20), new THREE.Vector3(90,80,20));
            }

            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                const p = enemyProjectiles[i];
                p.position.add(p.userData.velocity);
                p.userData.velocity.y -= GRAVITY * ENEMY_GRAVITY_MULTIPLIER;

                if (p.position.y < -360 || Math.abs(p.position.x) > 3200 || p.position.y < -1100) {
                    scene.remove(p);
                    enemyProjectiles.splice(i, 1);
                    continue;
                }

                const pBox = new THREE.Box3().setFromObject(p);
                const playerBox = tankGroup.userData.hitbox.clone().applyMatrix4(tankGroup.matrixWorld);

                if (pBox.intersectsBox(playerBox)) {
                    playerHealth = Math.max(0, playerHealth - DAMAGE_PER_HIT);
                    updateDamageBar();

                    tankSprite.material.color.set(0xff4444);
                    setTimeout(() => tankSprite.material.color.set(0xffffff), PLAYER_HIT_FLASH_DURATION);

                    playExplosion();

                    scene.remove(p);
                    enemyProjectiles.splice(i, 1);

                    if (playerHealth <= 0) {
                        showMessage("YOU GOT DESTROYED!", "#ff1744", 3500);
                        setTimeout(() => {
                            score = 0;
                            currentLevel = 1;
                            playerHealth = maxPlayerHealth;
                            updateDamageBar();
                            restartBtn.click();
                        }, 3800);
                    }
                }
            }
        }

        function levelComplete() {
            levelCleared = true;
            const lvlData = window.levels[(currentLevel - 1) % window.levels.length];
            const starMultiplier = shotsUsed <= 1 ? 3 : shotsUsed === 2 ? 2 : 1;
            score += lvlData.baseScore * starMultiplier * (MAX_TRIES - tryAgainCount + 1);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('angryTanksHighScore', highScore);
            }

            let msg = `LEVEL CLEAR!\n`;
            if (shotsUsed <= 1) msg += 'PERFECT! ★★★';
            else if (shotsUsed === 2) msg += 'GREAT! ★★';
            else msg += '★★☆';

            gameRunning = false;
            showMessage(msg, "#00ffcc", 3000);

            setTimeout(() => {
                currentLevel++;
                setNewBackground();
                spawnLevel(currentLevel - 1);
                gameRunning = true;
                updateUI();
            }, 3200);
        }

        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('angryTanksHighScore', highScore);
                showMessage("NEW HIGH SCORE!\nGAME OVER", "#ffff00", 4000);
            } else {
                showMessage("GAME OVER\nNO MORE SHOTS!", "#ff4444", 4000);
            }

            setTimeout(() => {
                currentLevel = 1;
                score = 0;
                shotsUsed = tryAgainCount = 0;
                playerHealth = maxPlayerHealth;
                updateDamageBar();
                setNewBackground();
                spawnLevel(0);
                gameRunning = true;
                updateUI();
            }, 4200);
        }

        function resetAfterShot() {
            if (projectile) scene.remove(projectile);
            if (trajectoryLine) trajectoryLine.visible = false;
            projectile = null;
            isFlying = followProjectile = false;
            turretGroup.rotation.z = 0;
            resetCamera(true);
            tryAgainCount++;
            shotsUsed++;
            updateUI();

            if (enemies.length === 0 && !levelCleared) {
                levelComplete();
                return;
            }

            if (tryAgainCount >= MAX_TRIES) gameOver();
            else createLoadedBall();
        }

        function getPointerPos(e) {
            const r = canvas.getBoundingClientRect();
            const x = e.touches?.[0]?.clientX ?? e.clientX;
            const y = e.touches?.[0]?.clientY ?? e.clientY;
            const nx = (x - r.left) / r.width;
            const ny = (y - r.top) / r.height;
            return { x: nx * 720 - 360, y: -(ny * 1280 - 640) };
        }

        function isClickOnTank(pos) {
            const lx = pos.x - tankGroup.position.x;
            const ly = pos.y - tankGroup.position.y;
            return Math.abs(lx) < 120 && Math.abs(ly + 10) < 85;
        }

        function onDown(e) {
            e.preventDefault();
            if (!gameRunning || !gameStarted || isFlying || isDragging || isPreviewActive) return;
            const pos = getPointerPos(e);
            if (isClickOnTank(pos)) {
                isDragging = true;
                dragStartPos.set(pos.x, pos.y);
                pullPos.copy(getBarrelTip());
                spring.visible = true;
            }
        }

        function onMove(e) {
            e.preventDefault();
            if (!isDragging || !gameStarted || isPreviewActive) return;
            const pos = getPointerPos(e);
            let dx = pos.x - dragStartPos.x;
            let dy = pos.y - dragStartPos.y;
            let d = Math.hypot(dx, dy);
            if (d > 150) { dx *= 150/d; dy *= 150/d; }
            pullPos.set(dragStartPos.x + dx, dragStartPos.y + dy, 0);

            const tip = getBarrelTip();
            const dyFromTip = pullPos.y - tip.y;
            const maxTilt = Math.PI / 5.5;
            turretGroup.rotation.z = Math.max(-maxTilt, Math.min(maxTilt, dyFromTip * 0.009));

            updateSpring(tip, pullPos);

            const stretch = tip.distanceTo(pullPos);
            if (stretch > 45) {
                const dir = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,0,1), turretGroup.rotation.z);
                const power = stretch * 0.23;
                updateTrajectory(tip, dir.normalize().multiplyScalar(power));
            }
        }

        function onUp(e) {
            e.preventDefault();
            if (!isDragging || !gameStarted) return;
            isDragging = false;
            spring.visible = trajectoryLine.visible = false;

            const tip = getBarrelTip();
            const stretch = tip.distanceTo(pullPos);
            if (stretch < 45) {
                turretGroup.rotation.z = 0;
                if (loadedBall) loadedBall.visible = true;
                return;
            }

            const dir = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,0,1), turretGroup.rotation.z);
            const power = stretch * 0.23;
            velocity.copy(dir.normalize()).multiplyScalar(power);
            velocity.x += windForce;

            const orig = turretGroup.rotation.z;
            turretGroup.rotation.z += 0.18;
            setTimeout(() => turretGroup.rotation.z = orig, 140);

            createProjectile(tip);
            isFlying = followProjectile = true;
            if (loadedBall) { scene.remove(loadedBall); loadedBall = null; }

            playCannonFire();
        }

        renderer.domElement.addEventListener('mousedown', onDown);
        renderer.domElement.addEventListener('mousemove', onMove);
        renderer.domElement.addEventListener('mouseup', onUp);
        renderer.domElement.addEventListener('touchstart', onDown, {passive:false});
        renderer.domElement.addEventListener('touchmove', onMove, {passive:false});
        renderer.domElement.addEventListener('touchend', onUp, {passive:false});

        quitBtn.addEventListener('click', () => {
            window.location.href = 'https://rbiz01.github.io/fuzzy-chainsaw/';
        });

        restartBtn.addEventListener('click', () => {
            score = 0;
            currentLevel = 1;
            shotsUsed = tryAgainCount = 0;
            playerHealth = maxPlayerHealth;
            updateDamageBar();
            turretGroup.rotation.z = 0;
            setNewBackground();
            spawnLevel(0);
            updateUI();
            gameRunning = true;
            resetCamera(true);
        });

        previewBtn.addEventListener('click', () => {
            if (!gameRunning || !gameStarted || isFlying || isDragging || isPreviewActive) return;
            isPreviewActive = true;
            previewPhase = 0;
            previewStartTime = performance.now();
            previewBtn.classList.add('active');
            if (spring) spring.visible = false;
            if (trajectoryLine) trajectoryLine.visible = false;
        });

        async function forceFullscreen() {
            try {
                const el = document.documentElement;
                if (!document.fullscreenElement) {
                    if (el.requestFullscreen) await el.requestFullscreen({ navigationUI: "hide" });
                    else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
                }
            } catch (e) {}
        }

        async function startGame(e) {
            if (gameStarted) return;
            e.preventDefault();

            gameStarted = true;
            gameRunning = true;

            if (startScreen) {
                startScreen.style.display = 'none';
            }

            await new Promise(resolve => setTimeout(resolve, 200));

            await initSounds();

            await forceFullscreen();

            setTimeout(() => window.scrollTo(0, 1), 100);
        }

        if (startScreen) {
            startScreen.addEventListener('click', startGame);
            startScreen.addEventListener('touchstart', startGame, { passive: false });
        }

        function animate() {
            requestAnimationFrame(animate);

            updateBackgroundFade();

            const time = performance.now() - hoverStartTime;
            if (gameRunning && gameStarted) {
                const playerOffset = Math.sin(time * HOVER_SPEED + tankGroup.userData.hoverPhase) * HOVER_AMPLITUDE;
                tankGroup.position.y = -340 + playerOffset;

                enemies.forEach(enemy => {
                    if (enemy.userData.alive) {
                        const offset = Math.sin(time * HOVER_SPEED + enemy.userData.hoverPhase) * HOVER_AMPLITUDE;
                        enemy.position.y = enemy.userData.originalY + offset;
                    }
                });
            }

            renderer.render(scene, camera);

            if (!gameRunning || !gameStarted) return;

            if (isFlying && projectile) {
                velocity.y -= GRAVITY;
                velocity.x += windForce * 0.1;
                projectile.position.add(velocity);
                projectile.rotation.x += velocity.y * 0.012;
                projectile.rotation.z += velocity.x * 0.01;

                if (projectile.position.y < -375) {
                    projectile.position.y = -375;
                    velocity.y *= -0.42;
                    velocity.x *= 0.38;
                    velocity.multiplyScalar(0.94);

                    if (Math.abs(velocity.y) < 7 && Math.abs(velocity.x) < 6) {
                        resetAfterShot();
                    }
                }

                if (projectile.position.x > 3000 || projectile.position.x < -450 || projectile.position.y < -1200) {
                    resetAfterShot();
                }

                checkCollisions();
            }

            updateEnemyAI();
            checkPlayerHit();

            enemyProjectiles.forEach(p => {
                p.rotation.x += p.userData.velocity.y * 0.008;
                p.rotation.z += p.userData.velocity.x * 0.006;
            });

            if (!isFlying && !levelCleared && enemies.length === 0 && shotsUsed > 0) {
                levelComplete();
            }

            if (isPreviewActive) {
                const elapsed = performance.now() - previewStartTime;
                let progress;
                if (previewPhase === 0) {
                    progress = Math.min(elapsed / PREVIEW_GO_DURATION, 1);
                    camera.position.x = THREE.MathUtils.lerp(PREVIEW_START_X, PREVIEW_END_X, progress);
                    if (progress >= 1) {
                        previewPhase = 1;
                        previewStartTime = performance.now();
                    }
                } else {
                    progress = Math.min(elapsed / PREVIEW_RETURN_DURATION, 1);
                    camera.position.x = THREE.MathUtils.lerp(PREVIEW_END_X, PREVIEW_START_X, progress);
                    if (progress >= 1) {
                        isPreviewActive = false;
                        previewBtn.classList.remove('active');
                        camera.position.copy(DEFAULT_CAMERA_POS);
                    }
                }
                camera.position.y = DEFAULT_CAMERA_POS.y;
                camera.position.z = DEFAULT_CAMERA_POS.z;
                camera.lookAt(camera.position.x, -100, 0);
            } else {
                if (followProjectile && projectile) {
                    camera.position.lerp(
                        new THREE.Vector3(projectile.position.x, 0, 500),
                        0.12
                    );
                    camera.position.x = Math.min(camera.position.x, 1400);
                } else {
                    camera.position.lerp(DEFAULT_CAMERA_POS, 0.04);
                    camera.lookAt(0, -100, 0);
                }
            }

            if (loadedBall && !isFlying && !isPreviewActive) {
                loadedBall.position.copy(getBarrelTip());
            }
        }

        function init() {
            highscoreEl.textContent = `BEST: ${highScore.toString().padStart(5,'0')}`;
            createSpring();
            createTrajectoryLine();
            setNewBackground();
            spawnLevel(0);
            updateUI();

            tankGroup.userData.hoverPhase = Math.random() * Math.PI * 2;

            animate();
        }

        init();
    </script>
</body>
</html>
