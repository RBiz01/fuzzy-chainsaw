<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angry Tanks</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            touch-action: none;
            font-family: 'Press Start 2P', cursive;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            max-height: 100vh;
            max-width: 100vw;
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: #fff;
            text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000;
        }
        #score {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 28px;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 15px;
            border: 4px solid #ffcc00;
        }
        #level {
            position: absolute;
            top: 90px;
            right: 30px;
            font-size: 22px;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 15px;
            border: 4px solid #00ffcc;
        }
        .button {
            position: absolute;
            bottom: 30px;
            width: 80px;
            height: 80px;
            background: #ff4444;
            border: 6px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 10px 0 #aa0000;
            transition: transform 0.1s;
        }
        .button:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #aa0000;
        }
        #quit { left: 30px; }
        #restart { right: 30px; }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            padding: 30px 60px;
            background: rgba(0,0,0,0.85);
            border: 8px solid #ffff00;
            border-radius: 20px;
            text-align: center;
            display: none;
            pointer-events: all;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="game"></canvas>
        
        <div id="ui">
            <div id="score">SCORE: 00000</div>
            <div id="level">LEVEL 1</div>
            <div id="quit" class="button">⏹</div>
            <div id="restart" class="button">⟳</div>
            <div id="message"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // =============== ANGRY TANKS v5.7 - NATURAL AIMING DIRECTION ===============
        // Pull finger/mouse UP → barrel tilts UP, DOWN → barrel tilts DOWN

        const container = document.getElementById('container');
        const canvas = document.getElementById('game');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const messageEl = document.getElementById('message');
        const quitBtn = document.getElementById('quit');
        const restartBtn = document.getElementById('restart');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.OrthographicCamera(-360, 360, 640, -640, 0.1, 1000);
        camera.position.set(-120, 80, 500);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(720, 1280);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffeecc, 1);
        sun.position.set(100, 200, 100);
        scene.add(sun);

        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(800, 100),
            new THREE.MeshPhongMaterial({ color: 0x3a9d23 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -400;
        scene.add(ground);

        const tankGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(90, 40, 50), new THREE.MeshPhongMaterial({ color: 0x006600, shininess: 60 }));
        tankGroup.add(body);

        const turret = new THREE.Group();
        const turretBase = new THREE.Mesh(new THREE.BoxGeometry(50, 30, 40), new THREE.MeshPhongMaterial({ color: 0x004d00 }));
        turret.add(turretBase);
        turret.position.set(10, 25, 0);
        tankGroup.add(turret);

        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(10, 10, 80, 16), new THREE.MeshPhongMaterial({ color: 0x222222 }));
        barrel.rotation.z = Math.PI / 2;
        barrel.position.set(35, 0, 0);
        turret.add(barrel);

        tankGroup.position.set(-220, -340, 10);
        scene.add(tankGroup);

        function getBarrelTip() {
            const tipLocal = new THREE.Vector3(40, 0, 0);
            tipLocal.applyMatrix4(barrel.matrixWorld);
            return tipLocal;
        }

        let spring;
        function createSpring() {
            const points = [];
            for(let i = 0; i < 60; i++) points.push(new THREE.Vector3());
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            spring = new THREE.Line(geo, new THREE.LineBasicMaterial({
                color: 0xff4444,
                linewidth: 10
            }));
            spring.renderOrder = -1;
            scene.add(spring);
            spring.visible = false;
        }

        function updateSpring(start, end) {
            if (!spring) return;
            const dir = new THREE.Vector3().subVectors(end, start);
            const len = dir.length();
            if (len < 25) {
                spring.visible = false;
                return;
            }

            dir.normalize();
            const perp = new THREE.Vector3(-dir.y, dir.x, 0).normalize();

            const offsetStart = start.clone().addScaledVector(dir, -3);
            const offsetEnd   = end.clone().addScaledVector(dir, -5);

            const points = [];
            const numCoils = Math.min(14, len * 0.055);

            for (let i = 0; i <= 60; i++) {
                const t = i / 60;
                let p = offsetStart.clone().lerp(offsetEnd, t);
                const coilRadius = 7 * (1 - t * 0.25);
                const angle = t * numCoils * Math.PI * 2;
                p.add(perp.clone().multiplyScalar(Math.sin(angle) * coilRadius));
                points.push(p);
            }

            spring.geometry.setFromPoints(points);
            spring.geometry.attributes.position.needsUpdate = true;
            spring.visible = true;
        }

        let score = 0;
        let currentLevel = 1;
        let projectile = null;
        let loadedBall = null;
        let velocity = new THREE.Vector3();
        let isDragging = false;
        let isFlying = false;
        let dragStartPos = new THREE.Vector2();
        let pullPos = new THREE.Vector3();
        let gameRunning = true;
        let tryAgainCount = 0;
        const MAX_TRIES = 3;
        const GRAVITY = 0.55;

        let followProjectile = false;
        const cameraOffset = new THREE.Vector3(-120, 80, 500);
        const cameraLerpSpeed = 0.08;

        const levels = [
            { enemies: [{x:180,y:-200}, {x:320,y:-280}, {x:420,y:-180}] },
            { enemies: [{x:150,y:-180}, {x:280,y:-280}, {x:380,y:-150}, {x:500,y:-250}] },
            { enemies: [{x:120,y:-200}, {x:250,y:-300}, {x:380,y:-180}, {x:480,y:-260}, {x:550,y:-140}] }
        ];

        let enemies = [];

        function createLoadedBall() {
            if (loadedBall) scene.remove(loadedBall);
            loadedBall = new THREE.Mesh(
                new THREE.SphereGeometry(18, 16, 16),
                new THREE.MeshPhongMaterial({ color: 0x333333, shininess: 80, specular: 0x555555 })
            );
            loadedBall.position.copy(getBarrelTip());
            scene.add(loadedBall);
        }

        function createProjectile(pos) {
            if (projectile) scene.remove(projectile);
            projectile = new THREE.Mesh(
                new THREE.SphereGeometry(18, 16, 16),
                new THREE.MeshPhongMaterial({ color: 0x333333, shininess: 80, specular: 0x555555 })
            );
            projectile.position.copy(pos);
            scene.add(projectile);
        }

        function createEnemyTank(x, y) {
            const group = new THREE.Group();
            group.add(new THREE.Mesh(new THREE.BoxGeometry(65, 32, 35), new THREE.MeshPhongMaterial({ color: 0xcc0000 })));
            const turretE = new THREE.Mesh(new THREE.BoxGeometry(40, 25, 30), new THREE.MeshPhongMaterial({ color: 0x880000 }));
            turretE.position.set(-5, 20, 0);
            group.add(turretE);
            const barrelE = new THREE.Mesh(new THREE.CylinderGeometry(7, 7, 45, 16), new THREE.MeshPhongMaterial({ color: 0x222222 }));
            barrelE.rotation.z = Math.PI / 2;
            barrelE.position.set(-25, 20, 0);
            group.add(barrelE);
            group.position.set(x, y, 5);
            group.userData = { alive: true };
            scene.add(group);
            return group;
        }

        function spawnLevel(levelIndex) {
            enemies.forEach(e => scene.remove(e));
            enemies = [];
            levels[levelIndex % levels.length].enemies.forEach(pos => {
                enemies.push(createEnemyTank(pos.x, pos.y));
            });
            if (projectile) scene.remove(projectile);
            projectile = null;
            isFlying = false;
            followProjectile = false;
            turret.rotation.z = 0;
            createLoadedBall();
        }

        function updateUI() {
            scoreEl.textContent = `SCORE: ${String(score).padStart(5, '0')}`;
            levelEl.textContent = `LEVEL ${currentLevel}`;
        }

        function showMessage(text, color = '#ffff00', duration = 2000) {
            messageEl.style.color = color;
            messageEl.style.borderColor = color;
            messageEl.textContent = text;
            messageEl.style.display = 'block';
            setTimeout(() => messageEl.style.display = 'none', duration);
        }

        function checkCollisions() {
            if (!projectile || !isFlying) return;
            const projBox = new THREE.Box3().setFromObject(projectile);
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                if (!enemy.userData.alive) continue;
                if (projBox.intersectsBox(new THREE.Box3().setFromObject(enemy))) {
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                    enemy.userData.alive = false;
                    score += 500;
                    updateUI();
                    createExplosion(enemy.position);
                    velocity.multiplyScalar(0.45);
                    if (enemies.length === 0) levelComplete();
                    return;
                }
            }
        }

        function createExplosion(pos) {
            for (let i = 0; i < 25; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(6, 6, 6),
                    new THREE.MeshPhongMaterial({ color: Math.random() > 0.5 ? 0xff8800 : 0xffff44 })
                );
                p.position.copy(pos);
                p.userData.vel = new THREE.Vector3(
                    (Math.random()-0.5)*25,
                    (Math.random()-0.5)*25 + 15,
                    0
                );
                scene.add(p);
                let life = 35;
                const timer = setInterval(() => {
                    life--;
                    p.position.add(p.userData.vel);
                    p.userData.vel.y -= 1.5;
                    p.scale.multiplyScalar(0.92);
                    if (life <= 0) {
                        clearInterval(timer);
                        scene.remove(p);
                    }
                }, 16);
            }
        }

        function levelComplete() {
            gameRunning = false;
            showMessage("LEVEL CLEAR!", "#00ffcc", 2500);
            setTimeout(() => {
                currentLevel++;
                tryAgainCount = 0;
                spawnLevel(currentLevel - 1);
                gameRunning = true;
                updateUI();
            }, 2600);
        }

        function gameOver() {
            gameRunning = false;
            showMessage("GAME OVER", "#ff4444", 4000);
            setTimeout(() => {
                currentLevel = 1;
                score = 0;
                tryAgainCount = 0;
                spawnLevel(0);
                gameRunning = true;
                updateUI();
            }, 4200);
        }

        function resetAfterShot() {
            if (projectile) scene.remove(projectile);
            projectile = null;
            isFlying = false;
            followProjectile = false;
            turret.rotation.z = 0;
            tryAgainCount++;
            if (tryAgainCount >= MAX_TRIES) gameOver();
            else createLoadedBall();
        }

        function getPointerPos(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (x - rect.left) / rect.width * 720 - 360,
                y: -((y - rect.top) / rect.height * 1280 - 640)
            };
        }

        function onDown(e) {
            e.preventDefault();
            if (!gameRunning || isFlying || isDragging) return;
            const pos = getPointerPos(e);
            const tip = getBarrelTip();
            if (Math.hypot(pos.x - tip.x, pos.y - tip.y) < 120) {
                isDragging = true;
                dragStartPos.set(pos.x, pos.y);
                pullPos.copy(tip);
                spring.visible = true;
            }
        }

        function onMove(e) {
            e.preventDefault();
            if (!isDragging) return;

            const pos = getPointerPos(e);
            let dx = pos.x - dragStartPos.x;
            let dy = pos.y - dragStartPos.y;
            let dist = Math.hypot(dx, dy);

            if (dist > 150) {
                dx *= 150 / dist;
                dy *= 150 / dist;
            }

            pullPos.set(dragStartPos.x + dx, dragStartPos.y + dy, 0);

            const tip = getBarrelTip();

            // Natural aiming: pull up → barrel up, pull down → barrel down
            const dyFromCenter = pullPos.y - tip.y;
            const maxTilt = Math.PI / 5.5;
            turret.rotation.z = Math.max(-maxTilt, Math.min(maxTilt, dyFromCenter * 0.009));

            updateSpring(tip, pullPos);
        }

        function onUp(e) {
            e.preventDefault();
            if (!isDragging) return;
            isDragging = false;
            spring.visible = false;

            const tip = getBarrelTip();
            const stretch = tip.distanceTo(pullPos);

            if (stretch < 45) {
                turret.rotation.z = 0;
                return;
            }

            const barrelDir = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0,0,1), turret.rotation.z);
            const power = stretch * 0.16;

            const origAngle = turret.rotation.z;
            turret.rotation.z += 0.18;
            setTimeout(() => { turret.rotation.z = origAngle; }, 140);

            createProjectile(tip);
            velocity.copy(barrelDir.normalize()).multiplyScalar(power);
            isFlying = true;
            followProjectile = true;

            if (loadedBall) {
                scene.remove(loadedBall);
                loadedBall = null;
            }
        }

        renderer.domElement.addEventListener('mousedown', onDown);
        renderer.domElement.addEventListener('mousemove', onMove);
        renderer.domElement.addEventListener('mouseup', onUp);
        renderer.domElement.addEventListener('touchstart', onDown, { passive: false });
        renderer.domElement.addEventListener('touchmove', onMove, { passive: false });
        renderer.domElement.addEventListener('touchend', onUp, { passive: false });

        quitBtn.addEventListener('click', () => window.location.reload());
        restartBtn.addEventListener('click', () => {
            score = 0; currentLevel = 1; tryAgainCount = 0; turret.rotation.z = 0;
            spawnLevel(0); updateUI(); gameRunning = true;
        });

        function animate() {
            requestAnimationFrame(animate);

            if (!gameRunning) {
                renderer.render(scene, camera);
                return;
            }

            if (isFlying && projectile) {
                velocity.y -= GRAVITY;
                projectile.position.add(velocity);

                projectile.rotation.x += velocity.y * 0.012;
                projectile.rotation.z += velocity.x * 0.01;

                if (projectile.position.y < -375) {
                    projectile.position.y = -375;
                    velocity.y *= -0.4;
                    velocity.x *= 0.8;
                    if (Math.abs(velocity.y) < 4 && Math.abs(velocity.x) < 3) {
                        resetAfterShot();
                    }
                }

                if (isFlying && projectile &&
                    (projectile.position.x > 650 || projectile.position.x < -450 || projectile.position.y < -800)) {
                    resetAfterShot();
                }

                checkCollisions();
            }

            if (followProjectile && projectile) {
                const target = projectile.position.clone().add(cameraOffset);
                camera.position.lerp(target, cameraLerpSpeed);
                camera.lookAt(projectile.position);
            } else {
                const def = new THREE.Vector3(-120, 80, 500);
                camera.position.lerp(def, cameraLerpSpeed * 1.4);
                camera.lookAt(0, -100, 0);
            }

            if (loadedBall && !isFlying) {
                loadedBall.position.copy(getBarrelTip());
            }

            renderer.render(scene, camera);
        }

        function init() {
            createSpring();
            spawnLevel(0);
            updateUI();
            animate();
            setTimeout(() => {
                showMessage("PULL ANY DIRECTION → RELEASE TO FIRE!", "#ffffff", 2800);
            }, 600);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(720, 1280);
            camera.updateProjectionMatrix();
        });

        init();
    </script>
</body>
</html>
