<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angry Tanks</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            touch-action: none;
            font-family: 'Press Start 2P', cursive;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            max-height: 100vh;
            max-width: 100vw;
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: #fff;
            text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000;
        }
        #score, #level {
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 12px;
        }
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 26px;
            border: 3px solid #ffcc00;
        }
        #level {
            position: absolute;
            top: 70px;
            right: 20px;
            font-size: 20px;
            border: 3px solid #00ffcc;
        }
        #balls {
            position: absolute;
            top: 100px;               /* moved lower to avoid crowding top */
            left: 20px;
            display: flex;
            gap: 10px;                /* smaller gap */
            pointer-events: none;
        }
        .cannon-ball-icon {
            width: 38px;              /* smaller icons */
            height: 38px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 3px 6px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.3); /* subtle fallback */
        }
        .button {
            position: absolute;
            bottom: 30px;
            width: 80px;
            height: 80px;
            background: #ff4444;
            border: 6px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 10px 0 #aa0000;
            transition: transform 0.1s;
        }
        .button:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #aa0000;
        }
        #quit { left: 30px; }
        #restart { right: 30px; }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            padding: 30px 60px;
            background: rgba(0,0,0,0.85);
            border: 8px solid #ffff00;
            border-radius: 20px;
            text-align: center;
            display: none;
            pointer-events: all;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="game"></canvas>
        
        <div id="ui">
            <div id="score">SCORE: 00000</div>
            <div id="level">LEVEL 1</div>
            <div id="balls"></div>
            <div id="quit" class="button">⏹</div>
            <div id="restart" class="button">⟳</div>
            <div id="message"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // =============== ANGRY TANKS v8.1 - BETTER GUI LAYOUT + MATCHING BALL ICONS ===============

        const container = document.getElementById('container');
        const canvas = document.getElementById('game');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const ballsEl = document.getElementById('balls');
        const messageEl = document.getElementById('message');
        const quitBtn = document.getElementById('quit');
        const restartBtn = document.getElementById('restart');

        const scene = new THREE.Scene();

        const camera = new THREE.OrthographicCamera(-360, 360, 640, -640, 0.1, 1000);
        camera.position.set(0, 0, 500);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(720, 1280);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffeecc, 1);
        sun.position.set(100, 200, 100);
        scene.add(sun);

        const textureLoader = new THREE.TextureLoader();
        const backgrounds = [];
        for (let i = 1; i <= 13; i++) {
            const texture = textureLoader.load(`https://rbiz01.github.io/fuzzy-chainsaw/tanky_assets/bg${i}.jpg`);
            texture.magFilter = THREE.LinearFilter;
            texture.minFilter = THREE.LinearFilter;
            backgrounds.push(texture);
        }

        const bgGeometry = new THREE.PlaneGeometry(2000, 2000);
        const bgMaterial1 = new THREE.MeshBasicMaterial({ transparent: true, opacity: 1.0 });
        const bgMaterial2 = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.0 });
        
        const skyBackground1 = new THREE.Mesh(bgGeometry, bgMaterial1);
        const skyBackground2 = new THREE.Mesh(bgGeometry, bgMaterial2);
        skyBackground1.position.set(0, 0, -100);
        skyBackground2.position.set(0, 0, -101);
        scene.add(skyBackground1);
        scene.add(skyBackground2);

        let currentBgIndex = -1;
        let previousBgIndex = -1;
        let bgFadeProgress = 0;
        let bgFadeDirection = 1;

        function setNewBackground() {
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * 13);
            } while (newIndex === previousBgIndex);
            
            previousBgIndex = currentBgIndex;
            currentBgIndex = newIndex;
            
            bgMaterial1.map = backgrounds[currentBgIndex];
            bgMaterial2.map = backgrounds[previousBgIndex !== -1 ? previousBgIndex : currentBgIndex];
            
            bgMaterial1.needsUpdate = true;
            bgMaterial2.needsUpdate = true;
            
            bgFadeProgress = 0;
            bgFadeDirection = 1;
        }

        function updateBackgroundFade() {
            if (bgFadeDirection === 1) {
                bgMaterial1.opacity = Math.min(1.0, bgFadeProgress);
                bgMaterial2.opacity = Math.max(0.0, 1.0 - bgFadeProgress);
                bgFadeProgress += 0.025;
                
                if (bgFadeProgress >= 1.0) {
                    bgFadeDirection = 0;
                }
            }
        }

        const platformTexture = textureLoader.load('https://rbiz01.github.io/fuzzy-chainsaw/tanky_assets/platform.png');
        platformTexture.magFilter = THREE.NearestFilter;
        platformTexture.minFilter = THREE.NearestFilter;
        platformTexture.transparent = true;
        platformTexture.premultiplyAlpha = true;

        const platformMaterial = new THREE.MeshBasicMaterial({
            map: platformTexture,
            transparent: true,
            side: THREE.DoubleSide,
            alphaTest: 0.1,
            color: 0xffffff
        });

        const tankTexture = textureLoader.load('https://rbiz01.github.io/fuzzy-chainsaw/tanky_assets/tank1.png');
        const turretTexture = textureLoader.load('https://rbiz01.github.io/fuzzy-chainsaw/tanky_assets/turret1.png');

        tankTexture.magFilter = THREE.NearestFilter;
        tankTexture.minFilter = THREE.NearestFilter;
        tankTexture.premultiplyAlpha = false;
        tankTexture.needsUpdate = true;

        turretTexture.magFilter = THREE.NearestFilter;
        turretTexture.minFilter = THREE.NearestFilter;
        turretTexture.premultiplyAlpha = false;
        turretTexture.needsUpdate = true;

        // Player tank setup (unchanged)
        const tankGroup = new THREE.Group();

        const playerPlatform = new THREE.Mesh(
            new THREE.PlaneGeometry(220, 130),
            platformMaterial
        );
        playerPlatform.position.set(0, -55, -8);
        playerPlatform.renderOrder = -2;
        tankGroup.add(playerPlatform);

        const tankSprite = new THREE.Mesh(
            new THREE.PlaneGeometry(160, 90),
            new THREE.MeshBasicMaterial({
                map: tankTexture,
                transparent: true,
                side: THREE.DoubleSide,
                alphaTest: 0.05
            })
        );
        tankSprite.position.set(0, 10, 0);
        tankGroup.add(tankSprite);

        const turretGroup = new THREE.Group();

        const turretSprite = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 80),
            new THREE.MeshBasicMaterial({
                map: turretTexture,
                transparent: true,
                side: THREE.DoubleSide,
                alphaTest: 0.05
            })
        );
        turretSprite.position.set(18, 42, 5);
        turretGroup.add(turretSprite);

        tankGroup.add(turretGroup);
        tankGroup.position.set(-220, -340, 10);

        tankGroup.userData.hitbox = new THREE.Box3(
            new THREE.Vector3(-60, -35, -10),
            new THREE.Vector3( 60,  35,  10)
        );

        scene.add(tankGroup);

        function getBarrelTip() {
            const tipLocal = new THREE.Vector3(65, 18, 0);
            return tipLocal.clone().applyMatrix4(turretGroup.matrixWorld);
        }

        let spring;
        function createSpring() {
            const points = [];
            for(let i = 0; i < 60; i++) points.push(new THREE.Vector3());
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            spring = new THREE.Line(geo, new THREE.LineBasicMaterial({
                color: 0xff4444,
                linewidth: 10
            }));
            spring.renderOrder = -1;
            scene.add(spring);
            spring.visible = false;
        }

        function updateSpring(start, end) {
            if (!spring) return;
            const dir = new THREE.Vector3().subVectors(end, start);
            const len = dir.length();
            if (len < 25) {
                spring.visible = false;
                return;
            }

            dir.normalize();
            const perp = new THREE.Vector3(-dir.y, dir.x, 0).normalize();

            const offsetStart = start.clone().addScaledVector(dir, -3);
            const offsetEnd   = end.clone().addScaledVector(dir, -5);

            const points = [];
            const numCoils = Math.min(14, len * 0.055);

            for (let i = 0; i <= 60; i++) {
                const t = i / 60;
                let p = offsetStart.clone().lerp(offsetEnd, t);
                const coilRadius = 7 * (1 - t * 0.25);
                const angle = t * numCoils * Math.PI * 2;
                p.add(perp.clone().multiplyScalar(Math.sin(angle) * coilRadius));
                points.push(p);
            }

            spring.geometry.setFromPoints(points);
            spring.geometry.attributes.position.needsUpdate = true;
            spring.visible = true;
        }

        const DEFAULT_CAMERA_POS = new THREE.Vector3(0, 0, 500);
        const cameraLerpSpeedFollow = 0.12;
        const cameraLerpSpeedReturn = 0.04;

        let followProjectile = false;

        function resetCamera(immediate = false) {
            followProjectile = false;
            if (immediate) {
                camera.position.copy(DEFAULT_CAMERA_POS);
                camera.lookAt(0, -100, 0);
            }
        }

        let score = 0;
        let currentLevel = 1;
        let projectile = null;
        let loadedBall = null;
        let velocity = new THREE.Vector3();
        let isDragging = false;
        let isFlying = false;
        let dragStartPos = new THREE.Vector2();
        let pullPos = new THREE.Vector3();
        let gameRunning = true;
        let tryAgainCount = 0;
        const MAX_TRIES = 3;
        const GRAVITY = 0.55;

        const levels = [
            { enemies: [{x:180,y:-200}, {x:320,y:-280}, {x:420,y:-180}] },
            { enemies: [{x:150,y:-180}, {x:280,y:-280}, {x:380,y:-150}, {x:500,y:-250}] },
            { enemies: [{x:120,y:-200}, {x:250,y:-300}, {x:380,y:-180}, {x:480,y:-260}, {x:550,y:-140}] }
        ];

        let enemies = [];

        // Small off-screen renderers for GUI cannon ball icons
        const iconSize = 44;
        const ballIconCanvases = [];

        function createBallIconRenderer() {
            const iconScene = new THREE.Scene();
            const iconCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            iconCamera.position.set(0, 0, 50);

            const iconRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            iconRenderer.setSize(iconSize, iconSize);
            iconRenderer.setPixelRatio(2);

            const ball = new THREE.Mesh(
                new THREE.SphereGeometry(12, 16, 16),
                new THREE.MeshPhongMaterial({ color: 0x333333, shininess: 80, specular: 0x555555 })
            );
            ball.position.set(0, 0, 0);
            iconScene.add(ball);

            iconScene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const iconSun = new THREE.DirectionalLight(0xffffff, 1.2);
            iconSun.position.set(30, 40, 50);
            iconScene.add(iconSun);

            iconRenderer.render(iconScene, iconCamera);

            return iconRenderer.domElement;
        }

        // Pre-create canvases
        for (let i = 0; i < MAX_TRIES; i++) {
            ballIconCanvases.push(createBallIconRenderer());
        }

        function updateBallsUI() {
            while (ballsEl.firstChild) {
                ballsEl.removeChild(ballsEl.firstChild);
            }

            const remaining = MAX_TRIES - tryAgainCount;

            for (let i = 0; i < remaining; i++) {
                const canvas = ballIconCanvases[i];
                const img = document.createElement('img');
                img.src = canvas.toDataURL();
                img.className = 'cannon-ball-icon';
                img.alt = 'shot remaining';
                ballsEl.appendChild(img);
            }
        }

        function createLoadedBall() {
            if (loadedBall) scene.remove(loadedBall);
            loadedBall = new THREE.Mesh(
                new THREE.SphereGeometry(18, 16, 16),
                new THREE.MeshPhongMaterial({ color: 0x333333, shininess: 80, specular: 0x555555 })
            );
            loadedBall.position.copy(getBarrelTip());
            loadedBall.visible = false;
            scene.add(loadedBall);
        }

        // ... (the rest of the functions: createProjectile, createEnemyTank, spawnLevel, updateUI, showMessage, checkCollisions, createExplosion, levelComplete, gameOver, resetAfterShot, getPointerPos, isClickOnTank, onDown, onMove, onUp, animate, init remain unchanged from the previous version)

        function init() {
            createSpring();
            setNewBackground();
            spawnLevel(0);
            updateUI();
            animate();
            setTimeout(() => {
                showMessage("TAP TANK → PULL → RELEASE\nShots left shown top-left", "#ffffff", 3400);
            }, 600);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(720, 1280);
            camera.updateProjectionMatrix();
        });

        init();
    </script>
</body>
</html>
