        function createCanvasTexture(isBack, cardData = null) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 768;
            const ctx = canvas.getContext('2d');

            if (isBack) {
                ctx.fillStyle = '#0f2540';
                ctx.fillRect(0,0,512,768);
                ctx.strokeStyle = '#d4af37';
                ctx.lineWidth = 32;
                ctx.strokeRect(36,36,440,696);
                ctx.fillStyle = '#d4af37';
                ctx.font = 'bold 88px Cinzel';
                ctx.textAlign = 'center';
                ctx.fillText('✧ TAROT ✧', 256, 390);
                ctx.lineWidth = 12;
                ctx.strokeRect(86, 110, 340, 548);
            } else {
                ctx.fillStyle = '#1c1408';
                ctx.fillRect(0,0,512,768);
                const grad = ctx.createLinearGradient(0,0,512,768);
                grad.addColorStop(0, '#3a2a1f');
                grad.addColorStop(1, '#2a1f14');
                ctx.fillStyle = grad;
                ctx.fillRect(26,26,460,716);

                ctx.strokeStyle = '#d4af37';
                ctx.lineWidth = 26;
                ctx.strokeRect(34,34,444,700);
                ctx.lineWidth = 9;
                ctx.strokeRect(52,52,408,664);

                ctx.fillStyle = '#f5e8c7';
                ctx.font = 'bold 42px Cinzel';
                ctx.textAlign = 'center';

                if (cardData.type === 'major') {
                    ctx.fillText(cardData.name.toUpperCase(), 256, 118);
                    ctx.font = '28px Playfair Display';
                    ctx.fillText('MAJOR ARCANA', 256, 162);
                    ctx.fillStyle = '#2a2118';
                    ctx.fillRect(96, 200, 320, 380);
                    ctx.strokeStyle = '#d4af37';
                    ctx.lineWidth = 14;
                    ctx.strokeRect(96,200,320,380);
                    ctx.fillStyle = '#ffcc66';
                    ctx.font = 'bold 120px Cinzel';
                    ctx.fillText('✦', 256, 410);
                } else {
                    const suitSymbol = cardData.suit === 'Wands' ? '🔥' : cardData.suit === 'Cups' ? '🌊' : cardData.suit === 'Swords' ? '⚔️' : '🌿';
                    const suitColor = cardData.suit === 'Wands' ? '#c94' : cardData.suit === 'Cups' ? '#48a' : cardData.suit === 'Swords' ? '#ddd' : '#4a6';
                    
                    ctx.fillStyle = suitColor;
                    ctx.font = 'bold 138px Cinzel';
                    ctx.fillText(cardData.rank[0]==='A' ? 'A' : cardData.rank.substring(0,2), 256, 210);
                    ctx.font = 'bold 58px Cinzel';
                    ctx.fillText(cardData.suit.toUpperCase(), 256, 300);
                    
                    ctx.fillStyle = '#111';
                    ctx.fillRect(96, 340, 320, 300);
                    ctx.strokeStyle = suitColor;
                    ctx.lineWidth = 18;
                    ctx.strokeRect(96,340,320,300);
                    
                    ctx.fillStyle = suitColor;
                    ctx.font = 'bold 92px Arial';
                    for (let i = 0; i < Math.min(10, parseInt(cardData.rank) || 1); i++) {
                        const x = 170 + (i%3)*70;
                        const y = 410 + Math.floor(i/3)*95;
                        ctx.fillText(suitSymbol, x, y);
                    }
                }
                ctx.fillStyle = '#f5e8c7';
                ctx.font = 'bold 29px Playfair Display';
                ctx.fillText(cardData.name, 256, 710);
            }
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.anisotropy = 16;
            return tex;
        }

        function createCardMesh(cardData, startFaceDown = true) {
            const geo = new THREE.BoxGeometry(CARD_WIDTH, CARD_THICKNESS, CARD_HEIGHT);
            const frontTex = createCanvasTexture(false, cardData);
            const backTex = createCanvasTexture(true);
            
            const edgeMat = new THREE.MeshLambertMaterial({color:0x3a2a1f});
            const frontMat = new THREE.MeshLambertMaterial({map:frontTex});
            const backMat = new THREE.MeshLambertMaterial({map:backTex});
            
            const materials = [
                edgeMat, edgeMat,    // +X -X
                frontMat, backMat,   // +Y = FRONT (visible when flat), -Y = back
                edgeMat, edgeMat     // +Z -Z
            ];
            
            const mesh = new THREE.Mesh(geo, materials);
            mesh.castShadow = mesh.receiveShadow = true;
            mesh.userData = {cardData};
            
            // Deck cards start face-down (back visible)
            if (startFaceDown) mesh.rotation.x = Math.PI;
            
            return mesh;
        }

        function createDeck() {
            deckGroup.clear();
            currentDeck = [];
            tarotDeckData.forEach(data => {
                const mesh = createCardMesh(data, true);
                mesh.position.set(-9.8, 0.2 + Math.random()*0.6, TABLE_Z + 8.5 + Math.random()*0.6);
                mesh.rotation.y = (Math.random()-0.5)*0.12;
                deckGroup.add(mesh);
                currentDeck.push({mesh, data, reversed: Math.random() > 0.48});
            });
            scene.add(deckGroup);
        }

        function shuffleDeck() {
            document.getElementById('loading').style.display = 'block';
            currentDeck.sort(() => Math.random()-0.5);
            currentDeck.forEach((c,i) => {
                c.reversed = Math.random() > 0.48;
                const m = c.mesh;
                m.position.set(-9.8, 0.2 + i*0.009, TABLE_Z + 8.5);
                m.rotation.set(Math.PI, (i%7-3)*0.04, 0);
            });
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                currentDrawIndex = 0;
                drawnPositions = [];
                document.getElementById('draw-btn').disabled = false;
                document.getElementById('interpret-btn').style.display = 'none';
                document.getElementById('info-panel').style.display = 'none';
            }, 850);
        }

        function animateDraw() {
            if (isAnimating || currentDrawIndex >= 10) return;
            isAnimating = true;
            
            const pos = spreadPositions[currentDrawIndex];
            const cardObj = currentDeck.pop();
            const mesh = cardObj.mesh;
            
            const start = mesh.position.clone();
            const target = new THREE.Vector3(pos.x, pos.y, pos.z);
            
            const targetRotY = pos.yRot + (cardObj.reversed ? Math.PI : 0);  // FIX: reversed = 180° flip in plane via y rotation
            
            let progress = 0;
            const startTime = Date.now();
            const duration = 1350;
            
            function step() {
                const t = Math.min((Date.now() - startTime) / duration, 1);
                progress = 1 - Math.pow(1 - t, 3);
                
                mesh.position.x = start.x + (target.x - start.x) * progress;
                mesh.position.y = start.y + 7.5 * Math.sin(progress * Math.PI);
                mesh.position.z = start.z + (target.z - start.z) * progress * 0.8 + Math.sin(progress * Math.PI) * 4;
                
                mesh.rotation.x = Math.PI * (1 - progress); // from PI (back up) → 0 (front up)
                mesh.rotation.y = targetRotY * progress;
                mesh.rotation.z = 0;
                
                if (t < 1) {
                    requestAnimationFrame(step);
                } else {
                    mesh.position.copy(target);
                    mesh.rotation.set(0, targetRotY, 0); // front up, reversed flipped via y
                
                    drawnPositions.push({position:pos, card:cardObj.data, reversed:cardObj.reversed, mesh});
                    showCardInfo(pos, cardObj.data, cardObj.reversed);
                    currentDrawIndex++;
                    isAnimating = false;
                    
                    if (currentDrawIndex < 10) {
                        document.getElementById('draw-btn').disabled = false;
                    } else {
                        document.getElementById('draw-btn').disabled = true;
                        document.getElementById('interpret-btn').style.display = 'block';
                    }
                }
            }
            step();
        }

        function showCardInfo(pos, card, reversed) {
            const p = document.getElementById('info-panel');
            document.getElementById('pos-name').textContent = pos.name;
            document.getElementById('card-name').textContent = card.name;
            const o = document.getElementById('orientation');
            o.textContent = reversed ? 'REVERSED' : 'UPRIGHT';
            o.style.color = reversed ? '#c66' : '#6c9';
            document.getElementById('short-desc').textContent = reversed ? card.reversed : card.upright;
            p.style.display = 'block';
        }

        function generateFullReading() {
            let html = '';
            let majorCount = 0, reversedCount = 0;
            let suitCounts = {Wands:0, Cups:0, Swords:0, Pentacles:0};
            
            drawnPositions.forEach(entry => {
                const orient = entry.reversed ? 'Reversed' : 'Upright';
                const meaning = entry.reversed ? entry.card.reversed : entry.card.upright;
                html += `
                    <div class="reading-line">
                        <strong>${entry.position.name}</strong><br>
                        <span style="color:#ffcc66; font-size:17.5px">${entry.card.name} — ${orient}</span><br>
                        <em>${meaning}</em>
                    </div>`;
                if (entry.card.type === 'major') majorCount++;
                if (entry.reversed) reversedCount++;
                if (entry.card.suit) suitCounts[entry.card.suit]++;
            });
            
            const dominantSuit = Object.keys(suitCounts).reduce((a,b) => suitCounts[a] > suitCounts[b] ? a : b);
            const revPct = Math.round(reversedCount / 10 * 100);
            let synthesis = `This Celtic Cross reveals a powerful story with <strong>${majorCount} Major Arcana</strong> — significant life lessons. `;
            synthesis += revPct > 45 ? `Many reversed cards (${revPct}%) indicate internal blocks. ` : `Mostly upright cards show forward momentum. `;
            synthesis += `Dominant energy: <strong>${dominantSuit}</strong>. `;
            synthesis += `<br><br><em>Card 10 is your key outcome.</em>`;
            
            html += `<div style="margin-top:32px; padding:22px; background:rgba(60,45,30,0.6); border-radius:10px; font-size:15px; line-height:1.65;">${synthesis}</div>`;
            
            document.getElementById('modal-scroll').innerHTML = html;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        let cameraAngle = .65;
        let cameraDist = 23.5;
        let cameraHeight = 16.5;
        let panX = 1.8;
        let panZ = -0.6;
        
        function updateCamera() {
            const x = Math.sin(cameraAngle) * cameraDist;
            const z = Math.cos(cameraAngle) * cameraDist;
            camera.position.set(x + panX, cameraHeight, z + panZ + 5);
            camera.lookAt(panX, -1.2, panZ + TABLE_Z);
        }

        function resetView() {
            cameraAngle = .65; 
            cameraDist = 23.5; 
            cameraHeight = 16.5; 
            panX = 1.8; panZ = -0.6;
            updateCamera();
        }

        let touches = [];
        let lastDist = 0;
        
        function handleTouchStart(e) {
            touches = Array.from(e.touches);
            if (touches.length === 2) lastDist = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
        }
        
        function handleTouchMove(e) {
            if (e.touches.length === 1) {
                const dx = e.touches[0].clientX - touches[0].clientX;
                cameraAngle += dx * 0.0088;
                touches[0] = e.touches[0];
                updateCamera();
            } else if (e.touches.length === 2) {
                const dx = (e.touches[0].clientX + e.touches[1].clientX)/2 - (touches[0].clientX + touches[1].clientX)/2;
                const dy = (e.touches[0].clientY + e.touches[1].clientY)/2 - (touches[0].clientY + touches[1].clientY)/2;
                panX += dx * 0.023;
                panZ += dy * 0.023;
                const newDist = Math.hypot(e.touches[0].clientX - touches[1].clientX, e.touches[0].clientY - touches[1].clientY);
                cameraDist = Math.max(13, Math.min(42, cameraDist - (newDist - lastDist) * 0.062));
                lastDist = newDist;
                touches = Array.from(e.touches);
                updateCamera();
            }
        }

        function initThree() {
            const canvas = document.getElementById('canvas');
            renderer = new THREE.WebGLRenderer({canvas, antialias:true});
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.2));
            renderer.shadowMap.enabled = true;
            
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a0a, 28, 65);
            
            camera = new THREE.PerspectiveCamera(46, innerWidth/innerHeight, 0.5, 100);
            updateCamera();
            
            scene.add(new THREE.AmbientLight(0x999999, 0.65));
            const sun = new THREE.DirectionalLight(0xffeedd, 1.25);
            sun.position.set(18, 32, 14);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            scene.add(sun);
            
            const tg = new THREE.PlaneGeometry(54, 40);
            const tm = new THREE.MeshLambertMaterial({color:0x2a2118});
            table = new THREE.Mesh(tg, tm);
            table.rotation.x = -Math.PI/2;
            table.position.y = -0.03;
            table.receiveShadow = true;
            scene.add(table);
            
            createDeck();
            shuffleDeck();
            
            window.addEventListener('resize', () => {
                camera.aspect = innerWidth/innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(innerWidth, innerHeight);
            });
            
            const el = renderer.domElement;
            el.addEventListener('touchstart', handleTouchStart);
            el.addEventListener('touchmove', handleTouchMove);
            el.addEventListener('touchend', () => touches = []);
            
            let mouseDown = false, lastMouseX = 0, lastMouseY = 0;
            el.addEventListener('mousedown', e => { mouseDown = true; lastMouseX = e.clientX; lastMouseY = e.clientY; });
            el.addEventListener('mousemove', e => {
                if (!mouseDown) return;
                if (e.buttons === 1) cameraAngle += (e.clientX - lastMouseX) * 0.0038;
                else if (e.buttons === 4) { panX += (e.clientX - lastMouseX) * 0.015; panZ += (e.clientY - lastMouseY) * 0.015; }
                lastMouseX = e.clientX; lastMouseY = e.clientY;
                updateCamera();
            });
            window.addEventListener('mouseup', () => mouseDown = false);
            el.addEventListener('wheel', e => {
                cameraDist = Math.max(13, Math.min(42, cameraDist + e.deltaY * 0.019));
                updateCamera();
            });
            
            document.getElementById('shuffle-btn').onclick = () => { if(!isAnimating) shuffleDeck(); };
            document.getElementById('draw-btn').onclick = () => { if(!isAnimating) { document.getElementById('draw-btn').disabled=true; animateDraw(); }};
            document.getElementById('interpret-btn').onclick = generateFullReading;
            document.getElementById('reset-view-btn').onclick = resetView;
            
            const modalClose = document.getElementById('modal-close');
            const modalCloseBtn = document.getElementById('modal-close-btn');
            modalClose.addEventListener('click', closeModal);
            modalCloseBtn.addEventListener('click', closeModal);
            document.getElementById('modal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
            
            renderer.setSize(innerWidth, innerHeight);
            function loop() { requestAnimationFrame(loop); renderer.render(scene, camera); }
            loop();
            
            setTimeout(resetView, 200);
        }

        window.onload = initThree;
    </script>
</body>
</html>
